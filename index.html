<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Combat Fitness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 70%);
    }
    #overlay h1 {
      font-size: 3rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
    #enter-vr {
      padding: 1rem 2.5rem; font-size: 1.2rem;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, #ff6b35, #e8552a);
      color: #fff; font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #enter-vr:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,107,53,0.4); }
    #enter-vr:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    #status { margin-top: 1rem; color: #666; font-size: 0.9rem; }
    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 20;
      color: #0f0; font-family: monospace; font-size: 12px;
      background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>VR COMBAT FITNESS</h1>
  <p>WebXR 6DoF Rhythm Fighting</p>
  <button id="enter-vr" disabled>Checking WebXR...</button>
  <div id="status"></div>
  <div id="version" style="position:fixed;bottom:10px;right:10px;color:#444;font-size:12px;font-family:monospace;">v0.2.0-ink</div>
</div>

<div id="debug"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const CONFIG = {
  // Target spawning
  SPAWN_DISTANCE: 5,        // meters in front of player
  HIT_DISTANCE: 0.6,        // how close to reach target
  TARGET_SPEED: 3.0,        // m/s travel toward player
  TARGET_RADIUS: 0.15,      // target sphere radius

  // Scoring
  PERFECT_THRESHOLD: 0.1,   // meters — distance for "PERFECT"
  GREAT_THRESHOLD: 0.2,     // "GREAT"
  GOOD_THRESHOLD: 0.4,      // "GOOD"
  MISS_DISTANCE: -0.5,      // passed behind player = miss

  // BPM & rhythm
  BPM: 128,
  BEATS_PER_SPAWN: 2,       // spawn target every N beats

  // Calorie estimation (rough MET-based)
  MET_VALUE: 6.0,           // approx MET for combat fitness
  USER_WEIGHT_KG: 70,       // default, can be changed

  // Velocity thresholds for punch detection
  MIN_PUNCH_VELOCITY: 1.5,  // m/s — minimum speed to count as a punch

  // Colors
  LEFT_COLOR: 0x4488ff,
  RIGHT_COLOR: 0xff4444,
  PERFECT_COLOR: 0xffd700,
  GREAT_COLOR: 0x00ff88,
  GOOD_COLOR: 0x44aaff,
  MISS_COLOR: 0xff2222,

  // Ink splatter
  INK_DROPLET_COUNT: 30,       // number of ink droplets per hit
  INK_SPLAT_COUNT: 6,          // number of wall/floor splat marks
  INK_GRAVITY: -4.0,           // gravity for ink droplets
  INK_INITIAL_SPEED: 4.0,      // base ejection speed
  INK_DROPLET_SIZE: 0.03,      // size of flying droplets
  INK_SPLAT_MIN_SIZE: 0.08,    // splat mark min radius
  INK_SPLAT_MAX_SIZE: 0.25,    // splat mark max radius
  INK_RESIDUE_LIFETIME: 30,    // seconds before residue fades
  INK_RESIDUE_FADE_TIME: 5,    // seconds to fade out at end of life
  MAX_RESIDUE_MARKS: 150,      // cap to prevent perf issues
};

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
const state = {
  score: 0,
  combo: 0,
  maxCombo: 0,
  hits: { perfect: 0, great: 0, good: 0, weak: 0, miss: 0 },
  totalPunches: 0,
  calories: 0,
  sessionStart: 0,
  isPlaying: false,
  beatIndex: 0,
  lastBeatTime: 0,
  targets: [],
  feedbacks: [],          // floating score text
  controllerVelocities: [new THREE.Vector3(), new THREE.Vector3()],
  controllerPrevPos: [new THREE.Vector3(), new THREE.Vector3()],
  controllerPrevPosInit: [false, false],
  trailPoints: [[], []],  // trail effect for controllers
  inkDroplets: [],         // flying ink particles
  inkResidues: [],         // splat marks on surfaces
};

// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.Fog(0x050510, 8, 25);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xff6b35, 2, 20, Math.PI / 4, 0.5);
spotLight.position.set(0, 5, -2);
scene.add(spotLight);

const pointLight1 = new THREE.PointLight(0x4488ff, 1, 15);
pointLight1.position.set(-3, 3, -5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4444, 1, 15);
pointLight2.position.set(3, 3, -5);
scene.add(pointLight2);

// ─────────────────────────────────────────────
// ENVIRONMENT — Arena
// ─────────────────────────────────────────────
function createArena() {
  // Ground — reflective dark floor
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.2,
    metalness: 0.8,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  scene.add(floor);

  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(20, 40, 0x222244, 0x111133);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Side pillars with glow
  for (let side = -1; side <= 1; side += 2) {
    const pillarGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
    const pillarMat = new THREE.MeshStandardMaterial({
      color: side === -1 ? 0x4488ff : 0xff4444,
      emissive: side === -1 ? 0x2244aa : 0xaa2222,
      emissiveIntensity: 0.5,
    });
    for (let z = -8; z <= -2; z += 3) {
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(side * 3, 2, z);
      scene.add(pillar);
    }
  }

  // Spawn lane indicator (two parallel light strips)
  const stripGeo = new THREE.BoxGeometry(0.05, 0.02, 12);
  const stripMat = new THREE.MeshStandardMaterial({
    color: 0xff6b35, emissive: 0xff6b35, emissiveIntensity: 0.3,
  });
  for (let side = -1; side <= 1; side += 2) {
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(side * 1.5, 0.01, -4);
    scene.add(strip);
  }

  // ── Back wall (miss targets splat here) ──
  const wallGeo = new THREE.PlaneGeometry(8, 4);
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a18,
    roughness: 0.6,
    metalness: 0.2,
    transparent: true,
    opacity: 0.85,
  });
  const backWall = new THREE.Mesh(wallGeo, wallMat);
  backWall.position.set(0, 2, CONFIG.MISS_DISTANCE + 0.5);
  backWall.name = 'backWall';
  scene.add(backWall);

  // Subtle border glow on wall edges
  const wallBorderGeo = new THREE.EdgesGeometry(wallGeo);
  const wallBorderMat = new THREE.LineBasicMaterial({
    color: 0x332244, transparent: true, opacity: 0.5,
  });
  const wallBorder = new THREE.LineSegments(wallBorderGeo, wallBorderMat);
  wallBorder.position.copy(backWall.position);
  scene.add(wallBorder);
}
createArena();

// ─────────────────────────────────────────────
// CONTROLLERS
// ─────────────────────────────────────────────
const controllerModelFactory = new XRControllerModelFactory();
const controllers = [];
const controllerGrips = [];
const glovesMeshes = [];

for (let i = 0; i < 2; i++) {
  const controller = renderer.xr.getController(i);
  scene.add(controller);
  controllers.push(controller);

  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerModelFactory.createControllerModel(grip));
  scene.add(grip);
  controllerGrips.push(grip);

  // Visual "glove" around controller
  const gloveColor = i === 0 ? CONFIG.LEFT_COLOR : CONFIG.RIGHT_COLOR;
  const gloveGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const gloveMat = new THREE.MeshStandardMaterial({
    color: gloveColor,
    emissive: gloveColor,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.7,
  });
  const glove = new THREE.Mesh(gloveGeo, gloveMat);
  controller.add(glove);
  glovesMeshes.push(glove);

  // Trail line
  const trailGeo = new THREE.BufferGeometry();
  const trailPositions = new Float32Array(30 * 3); // 30 points
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  const trailMat = new THREE.LineBasicMaterial({
    color: gloveColor,
    transparent: true,
    opacity: 0.4,
  });
  const trailLine = new THREE.Line(trailGeo, trailMat);
  trailLine.frustumCulled = false;
  scene.add(trailLine);
  controller.userData.trail = trailLine;
  controller.userData.trailIndex = 0;
}

// ─────────────────────────────────────────────
// TARGET POOL & GENERATION
// ─────────────────────────────────────────────
const targetPool = [];
const TARGET_POOL_SIZE = 20;

// Reusable geometry/material
const targetGeo = new THREE.OctahedronGeometry(CONFIG.TARGET_RADIUS, 1);
const targetOuterGeo = new THREE.OctahedronGeometry(CONFIG.TARGET_RADIUS * 1.4, 1);

function createTarget() {
  const group = new THREE.Group();

  // Inner solid
  const innerMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.9,
  });
  const inner = new THREE.Mesh(targetGeo, innerMat.clone());
  group.add(inner);
  group.userData.inner = inner;

  // Outer wireframe
  const outerMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    wireframe: true,
    transparent: true,
    opacity: 0.3,
  });
  const outer = new THREE.Mesh(targetOuterGeo, outerMat.clone());
  group.add(outer);
  group.userData.outer = outer;

  group.visible = false;
  scene.add(group);
  return group;
}

// Pre-populate pool
for (let i = 0; i < TARGET_POOL_SIZE; i++) {
  targetPool.push(createTarget());
}

function getTarget() {
  for (const t of targetPool) {
    if (!t.visible) return t;
  }
  const t = createTarget();
  targetPool.push(t);
  return t;
}

// Spawn patterns — inspired by combat moves
const SPAWN_PATTERNS = [
  // [x, y] offsets from center, hand preference (0=left, 1=right, -1=either)
  { positions: [{ x: -0.5, y: 1.3, hand: 0 }], name: 'left_jab' },
  { positions: [{ x: 0.5, y: 1.3, hand: 1 }], name: 'right_jab' },
  { positions: [{ x: -0.5, y: 1.3, hand: 0 }, { x: 0.5, y: 1.3, hand: 1 }], name: 'double_jab' },
  { positions: [{ x: -0.3, y: 1.6, hand: 0 }], name: 'left_hook_high' },
  { positions: [{ x: 0.3, y: 1.6, hand: 1 }], name: 'right_hook_high' },
  { positions: [{ x: -0.6, y: 1.0, hand: 0 }], name: 'left_body' },
  { positions: [{ x: 0.6, y: 1.0, hand: 1 }], name: 'right_body' },
  { positions: [{ x: 0, y: 1.8, hand: -1 }], name: 'uppercut_center' },
  { positions: [{ x: -0.7, y: 1.3, hand: 0 }, { x: 0.7, y: 1.3, hand: 1 }], name: 'wide_combo' },
  { positions: [{ x: -0.3, y: 1.0, hand: 0 }, { x: 0.3, y: 1.6, hand: 1 }], name: 'cross_combo' },
];

function spawnTarget() {
  const pattern = SPAWN_PATTERNS[Math.floor(Math.random() * SPAWN_PATTERNS.length)];

  for (const pos of pattern.positions) {
    const target = getTarget();
    const color = pos.hand === 0 ? CONFIG.LEFT_COLOR :
                  pos.hand === 1 ? CONFIG.RIGHT_COLOR : 0xffd700;

    target.userData.inner.material.color.setHex(color);
    target.userData.inner.material.emissive.setHex(color);
    target.userData.outer.material.color.setHex(color);
    target.userData.hand = pos.hand;
    target.userData.hit = false;
    target.userData.spawnTime = performance.now();

    // Position: offset X/Y, far on Z
    target.position.set(
      pos.x + (Math.random() - 0.5) * 0.2,
      pos.y + (Math.random() - 0.5) * 0.1,
      -CONFIG.SPAWN_DISTANCE
    );
    target.visible = true;
    target.scale.setScalar(0.01);
    state.targets.push(target);
  }
}

// ─────────────────────────────────────────────
// SCORING & FEEDBACK
// ─────────────────────────────────────────────
function evaluateHit(distance) {
  if (distance < CONFIG.PERFECT_THRESHOLD) {
    return { label: 'PERFECT', score: 100, color: CONFIG.PERFECT_COLOR };
  } else if (distance < CONFIG.GREAT_THRESHOLD) {
    return { label: 'GREAT', score: 75, color: CONFIG.GREAT_COLOR };
  } else if (distance < CONFIG.GOOD_THRESHOLD) {
    return { label: 'GOOD', score: 50, color: CONFIG.GOOD_COLOR };
  }
  return null;
}

function showFeedback(position, label, color) {
  // Create floating text sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 128);
  ctx.font = 'bold 48px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  ctx.fillText(label, 128, 72);

  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(0.8, 0.4, 1);
  sprite.userData.life = 1.0;
  scene.add(sprite);
  state.feedbacks.push(sprite);
}

function onHit(target, controllerIndex, distance) {
  const result = evaluateHit(distance);
  if (!result) return;

  target.userData.hit = true;
  target.visible = false;

  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const comboMultiplier = 1 + Math.floor(state.combo / 10) * 0.5;
  const points = Math.round(result.score * comboMultiplier);
  state.score += points;
  state.totalPunches++;
  state.hits[result.label.toLowerCase()]++;

  // Haptic feedback
  const session = renderer.xr.getSession();
  if (session) {
    const sources = session.inputSources;
    if (sources[controllerIndex] && sources[controllerIndex].gamepad) {
      const gp = sources[controllerIndex].gamepad;
      if (gp.hapticActuators && gp.hapticActuators.length > 0) {
        gp.hapticActuators[0].pulse(0.8, 100);
      }
    }
  }

  // Ink splatter explosion — pass punch velocity for directional spray
  const punchVel = state.controllerVelocities[controllerIndex].clone();
  createHitEffect(target.position.clone(), result.color, punchVel, result.label);
  // Additive flash burst (brief, complementary to ink)
  createOldParticleEffect(target.position.clone(), result.color);

  // Show feedback text
  const feedbackPos = target.position.clone();
  feedbackPos.y += 0.3;
  showFeedback(feedbackPos, `${result.label} +${points}`, result.color);

  // Glove pulse
  const glove = glovesMeshes[controllerIndex];
  if (glove) {
    glove.scale.setScalar(1.5);
  }
}

function onMiss(target) {
  state.combo = 0;
  state.hits.miss++;

  // Ink splat on back wall — target smashes into wall
  const wallZ = CONFIG.MISS_DISTANCE + 0.52; // just in front of wall surface
  const splatPos = new THREE.Vector3(target.position.x, target.position.y, wallZ);
  const wallNormal = new THREE.Vector3(0, 0, 1); // wall faces player

  // Big red splat on wall
  createInkResidue(splatPos, wallNormal, CONFIG.MISS_COLOR, 1.8, 'MISS');

  // Drip effect — several smaller splats below impact, simulating ink running down
  const dripCount = 3 + Math.floor(Math.random() * 3);
  for (let d = 0; d < dripCount; d++) {
    const dripPos = splatPos.clone();
    dripPos.x += (Math.random() - 0.5) * 0.2;
    dripPos.y -= 0.1 + Math.random() * 0.4 * (d + 1);
    dripPos.z = wallZ;
    createInkResidue(dripPos, wallNormal, CONFIG.MISS_COLOR, 0.4 + Math.random() * 0.3, 'MISS');
  }

  // Some ink droplets spray off the wall toward player
  const splashVel = new THREE.Vector3(
    (Math.random() - 0.5) * 2,
    1 + Math.random(),
    1.5
  );
  createInkSplatter(splatPos, splashVel, CONFIG.MISS_COLOR, 'GOOD'); // smaller splash

  const feedbackPos = target.position.clone();
  feedbackPos.y += 0.2;
  showFeedback(feedbackPos, 'MISS', CONFIG.MISS_COLOR);
  target.visible = false;
}

// ─────────────────────────────────────────────
// INK SPLATTER SYSTEM
// ─────────────────────────────────────────────

// Shared geometries for ink
const inkDropGeo = new THREE.SphereGeometry(1, 6, 6); // scaled per droplet
const inkSplatGeo = new THREE.CircleGeometry(1, 12);   // scaled per splat

// Create a procedural ink splat texture (irregular blob)
function createInkSplatTexture(color) {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const cx = size / 2, cy = size / 2;
  const hex = '#' + color.toString(16).padStart(6, '0');

  // Main blob — irregular radial shape
  ctx.beginPath();
  const points = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const radius = (size * 0.3) + Math.random() * (size * 0.15);
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Radial gradient for depth
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.45);
  grad.addColorStop(0, hex);
  grad.addColorStop(0.6, hex);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Smaller satellite drips
  for (let i = 0; i < 5 + Math.floor(Math.random() * 5); i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = size * 0.3 + Math.random() * size * 0.15;
    const r = 2 + Math.random() * 6;
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, r, 0, Math.PI * 2);
    ctx.fillStyle = hex;
    ctx.fill();
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

// Spawn flying ink droplets from hit point
function createInkSplatter(position, punchVelocity, color, hitQuality) {
  const count = CONFIG.INK_DROPLET_COUNT;
  // More droplets & bigger for PERFECT, fewer & smaller for GOOD
  const qualityScale = hitQuality === 'PERFECT' ? 1.3 :
                       hitQuality === 'GREAT' ? 1.0 : 0.7;

  // Normalize punch direction (ink flies opposite to punch)
  const punchDir = punchVelocity.clone().normalize();
  const punchSpeed = punchVelocity.length();

  for (let i = 0; i < Math.round(count * qualityScale); i++) {
    // Spray direction: mostly along punch direction with spread
    const spread = 0.6 + (1 - qualityScale) * 0.4; // tighter spread for better hits
    const dir = new THREE.Vector3(
      punchDir.x + (Math.random() - 0.5) * spread,
      punchDir.y + (Math.random() - 0.5) * spread + 0.3, // slight upward bias
      punchDir.z + (Math.random() - 0.5) * spread
    ).normalize();

    const speed = CONFIG.INK_INITIAL_SPEED * (0.5 + Math.random()) * qualityScale;
    // Scale velocity with actual punch speed
    const velScale = Math.min(punchSpeed / 3, 2.0);

    const droplet = new THREE.Mesh(
      inkDropGeo,
      new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.3,
        roughness: 0.3,
        metalness: 0.1,
      })
    );

    const s = CONFIG.INK_DROPLET_SIZE * (0.5 + Math.random() * 0.8) * qualityScale;
    droplet.scale.setScalar(s);
    droplet.position.copy(position);

    droplet.userData = {
      velocity: dir.multiplyScalar(speed * velScale),
      life: 1.5 + Math.random(), // seconds until it "lands"
      color: color,
      size: s,
      hitQuality: hitQuality,
      hasLanded: false,
    };

    scene.add(droplet);
    state.inkDroplets.push(droplet);
  }
}

// Create a residue splat mark at a position/surface
function createInkResidue(position, normal, color, size, hitQuality) {
  // Remove oldest if over cap
  while (state.inkResidues.length >= CONFIG.MAX_RESIDUE_MARKS) {
    const oldest = state.inkResidues.shift();
    scene.remove(oldest);
    oldest.material.map?.dispose();
    oldest.material.dispose();
  }

  const texture = createInkSplatTexture(color);
  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    opacity: 0.85,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.NormalBlending,
  });

  const splatSize = CONFIG.INK_SPLAT_MIN_SIZE +
    Math.random() * (CONFIG.INK_SPLAT_MAX_SIZE - CONFIG.INK_SPLAT_MIN_SIZE);
  const splat = new THREE.Mesh(inkSplatGeo, mat);
  splat.scale.setScalar(splatSize * size);
  splat.position.copy(position);

  // Orient to surface normal
  if (normal) {
    splat.lookAt(position.clone().add(normal));
  }

  // Slight random rotation for variety
  splat.rotation.z = Math.random() * Math.PI * 2;

  splat.userData = {
    spawnTime: performance.now(),
    lifetime: CONFIG.INK_RESIDUE_LIFETIME * 1000,
    fadeTime: CONFIG.INK_RESIDUE_FADE_TIME * 1000,
    hitQuality: hitQuality,
    baseOpacity: 0.85,
  };

  scene.add(splat);
  state.inkResidues.push(splat);
}

// When a hit occurs — create the main ink burst + immediate splat at hit point
function createHitEffect(position, color, punchVelocity, hitQuality) {
  // 1) Flying ink droplets
  createInkSplatter(position, punchVelocity || new THREE.Vector3(0, 0, -2), color, hitQuality || 'GREAT');

  // 2) Immediate central splat at hit point (the "impact mark")
  const impactSize = hitQuality === 'PERFECT' ? 1.5 :
                     hitQuality === 'GREAT' ? 1.2 : 0.8;
  createInkResidue(
    position.clone(),
    new THREE.Vector3(0, 0, 1), // facing player
    color,
    impactSize,
    hitQuality || 'GREAT'
  );
}

// Update ink droplets — physics simulation
function updateInkSystem(delta) {
  const now = performance.now();

  // ── Flying droplets ──
  for (let i = state.inkDroplets.length - 1; i >= 0; i--) {
    const d = state.inkDroplets[i];

    // Apply gravity
    d.userData.velocity.y += CONFIG.INK_GRAVITY * delta;

    // Move
    d.position.x += d.userData.velocity.x * delta;
    d.position.y += d.userData.velocity.y * delta;
    d.position.z += d.userData.velocity.z * delta;

    // Stretch droplet in velocity direction (teardrop effect)
    const speed = d.userData.velocity.length();
    if (speed > 1) {
      const stretch = Math.min(speed * 0.15, 2.5);
      d.scale.set(d.userData.size, d.userData.size * stretch, d.userData.size);
      d.lookAt(d.position.clone().add(d.userData.velocity));
    }

    d.userData.life -= delta;

    // Check if hit floor (y ≈ 0) or timed out
    const hitFloor = d.position.y <= 0.02;
    const timedOut = d.userData.life <= 0;

    if (hitFloor || timedOut) {
      // Create residue splat where it landed
      const splatPos = d.position.clone();
      let normal;
      if (hitFloor) {
        splatPos.y = 0.015; // just above floor
        normal = new THREE.Vector3(0, 1, 0);
      } else {
        normal = d.userData.velocity.clone().normalize().negate();
      }

      const splatScale = 0.6 + speed * 0.1;
      createInkResidue(splatPos, normal, d.userData.color, splatScale, d.userData.hitQuality);

      // Remove droplet
      scene.remove(d);
      d.material.dispose();
      state.inkDroplets.splice(i, 1);
    }
  }

  // ── Residue fade over time ──
  for (let i = state.inkResidues.length - 1; i >= 0; i--) {
    const r = state.inkResidues[i];
    const age = now - r.userData.spawnTime;
    const remaining = r.userData.lifetime - age;

    if (remaining <= 0) {
      // Remove
      scene.remove(r);
      r.material.map?.dispose();
      r.material.dispose();
      state.inkResidues.splice(i, 1);
    } else if (remaining < r.userData.fadeTime) {
      // Fade out
      r.material.opacity = r.userData.baseOpacity * (remaining / r.userData.fadeTime);
    }
  }
}

// Legacy wrapper for existing particle systems (keep for non-ink effects)
const particleSystems = [];

function createOldParticleEffect(position, color) {
  // Minimal flash burst (supplement to ink)
  const count = 8;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];
  for (let i = 0; i < count; i++) {
    positions[i * 3] = position.x;
    positions[i * 3 + 1] = position.y;
    positions[i * 3 + 2] = position.z;
    velocities.push(new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4
    ));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color, size: 0.04, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const points = new THREE.Points(geo, mat);
  points.userData.velocities = velocities;
  points.userData.life = 0.4; // short flash
  scene.add(points);
  particleSystems.push(points);
}

// ─────────────────────────────────────────────
// HUD (in-VR using sprites)
// ─────────────────────────────────────────────
let hudSprite;
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512;
hudCanvas.height = 256;
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);

function createHUD() {
  const mat = new THREE.SpriteMaterial({ map: hudTexture, transparent: true, depthTest: false });
  hudSprite = new THREE.Sprite(mat);
  hudSprite.scale.set(1.5, 0.75, 1);
  // Will be positioned relative to camera each frame
  scene.add(hudSprite);
}
createHUD();

function updateHUD() {
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 512, 256);

  // Background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.roundRect(10, 10, 492, 236, 15);
  ctx.fill();

  // Score
  ctx.font = 'bold 42px Segoe UI, sans-serif';
  ctx.fillStyle = '#ff6b35';
  ctx.textAlign = 'left';
  ctx.fillText(state.score.toLocaleString(), 30, 65);

  // Combo
  if (state.combo > 1) {
    ctx.font = 'bold 28px Segoe UI, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`${state.combo}x COMBO`, 30, 105);
  }

  // Stats
  ctx.font = '18px Segoe UI, sans-serif';
  ctx.fillStyle = '#aaa';
  const elapsed = state.sessionStart > 0 ? (performance.now() - state.sessionStart) / 1000 : 0;
  const minutes = Math.floor(elapsed / 60);
  const seconds = Math.floor(elapsed % 60);
  ctx.fillText(`Time: ${minutes}:${seconds.toString().padStart(2, '0')}`, 30, 145);

  // Calories (MET formula: kcal/min = MET * weight * 3.5 / 200)
  state.calories = (CONFIG.MET_VALUE * CONFIG.USER_WEIGHT_KG * 3.5 / 200) * (elapsed / 60);
  ctx.fillText(`Cal: ${Math.round(state.calories)} kcal`, 30, 175);

  // Accuracy
  const totalHits = state.hits.perfect + state.hits.great + state.hits.good + state.hits.weak;
  const totalAttempts = totalHits + state.hits.miss;
  const accuracy = totalAttempts > 0 ? Math.round((totalHits / totalAttempts) * 100) : 100;
  ctx.fillText(`Accuracy: ${accuracy}%`, 30, 205);

  // Right side — hit breakdown
  ctx.textAlign = 'right';
  ctx.font = '16px Segoe UI, sans-serif';
  ctx.fillStyle = '#ffd700'; ctx.fillText(`Perfect: ${state.hits.perfect}`, 480, 145);
  ctx.fillStyle = '#00ff88'; ctx.fillText(`Great: ${state.hits.great}`, 480, 170);
  ctx.fillStyle = '#44aaff'; ctx.fillText(`Good: ${state.hits.good}`, 480, 195);
  ctx.fillStyle = '#886644'; ctx.fillText(`Weak: ${state.hits.weak}`, 480, 220);
  ctx.fillStyle = '#ff2222'; ctx.fillText(`Miss: ${state.hits.miss}`, 480, 245);

  hudTexture.needsUpdate = true;
}

// ─────────────────────────────────────────────
// BEAT / RHYTHM ENGINE
// ─────────────────────────────────────────────
const beatInterval = () => (60 / CONFIG.BPM) * CONFIG.BEATS_PER_SPAWN * 1000; // ms

// AudioContext for beat sync (created on user gesture)
let audioCtx = null;
let beatOsc = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeatTick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function playHitSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 220;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();
const tmpVec = new THREE.Vector3();
const cameraWorldPos = new THREE.Vector3();

function gameLoop(timestamp, frame) {
  const delta = clock.getDelta();

  if (!state.isPlaying) return;

  const now = performance.now();

  // ── Beat-based spawning ──
  if (now - state.lastBeatTime > beatInterval()) {
    state.lastBeatTime = now;
    state.beatIndex++;
    spawnTarget();
    playBeatTick();
  }

  // ── Update controller velocities ──
  for (let i = 0; i < controllers.length; i++) {
    const ctrl = controllers[i];
    const worldPos = new THREE.Vector3();
    ctrl.getWorldPosition(worldPos);

    if (state.controllerPrevPosInit[i]) {
      state.controllerVelocities[i].subVectors(worldPos, state.controllerPrevPos[i]).divideScalar(delta);
    }
    state.controllerPrevPos[i].copy(worldPos);
    state.controllerPrevPosInit[i] = true;

    // Update trail
    const trail = ctrl.userData.trail;
    if (trail) {
      const posAttr = trail.geometry.getAttribute('position');
      const idx = (ctrl.userData.trailIndex % 30) * 3;
      posAttr.array[idx] = worldPos.x;
      posAttr.array[idx + 1] = worldPos.y;
      posAttr.array[idx + 2] = worldPos.z;
      posAttr.needsUpdate = true;
      ctrl.userData.trailIndex++;
    }

    // Glove pulse decay
    const glove = glovesMeshes[i];
    if (glove && glove.scale.x > 1.0) {
      glove.scale.multiplyScalar(0.9);
      if (glove.scale.x < 1.01) glove.scale.setScalar(1.0);
    }
  }

  // ── Update targets ──
  for (let i = state.targets.length - 1; i >= 0; i--) {
    const target = state.targets[i];
    if (target.userData.hit) {
      state.targets.splice(i, 1);
      continue;
    }

    // Move toward player
    target.position.z += CONFIG.TARGET_SPEED * delta;

    // Scale-in animation
    if (target.scale.x < 1) {
      target.scale.addScalar(delta * 5);
      if (target.scale.x > 1) target.scale.setScalar(1);
    }

    // Rotate for visual flair
    target.rotation.y += delta * 2;
    target.rotation.x += delta * 1.5;

    // Collision detection with controllers (check BEFORE miss)
    let wasHit = false;
    for (let c = 0; c < controllers.length; c++) {
      // Check hand preference
      if (target.userData.hand !== -1 && target.userData.hand !== c) continue;

      const ctrlPos = new THREE.Vector3();
      controllers[c].getWorldPosition(ctrlPos);
      const dist = ctrlPos.distanceTo(target.position);

      // Check if close enough AND moving fast enough (actual punch)
      const speed = state.controllerVelocities[c].length();
      if (dist < CONFIG.HIT_DISTANCE && speed > CONFIG.MIN_PUNCH_VELOCITY) {
        onHit(target, c, dist);
        playHitSound();
        state.targets.splice(i, 1);
        wasHit = true;
        break;
      }
    }
    if (wasHit) continue;

    // Check if passed player (miss)
    if (target.position.z > CONFIG.MISS_DISTANCE) {
      onMiss(target);
      state.targets.splice(i, 1);
      continue;
    }
  }

  // ── Update ink splatter system ──
  updateInkSystem(delta);

  // ── Update legacy particle systems (flash bursts) ──
  for (let i = particleSystems.length - 1; i >= 0; i--) {
    const ps = particleSystems[i];
    ps.userData.life -= delta * 3;
    if (ps.userData.life <= 0) {
      scene.remove(ps);
      ps.geometry.dispose();
      ps.material.dispose();
      particleSystems.splice(i, 1);
      continue;
    }
    ps.material.opacity = ps.userData.life;
    const posAttr = ps.geometry.getAttribute('position');
    for (let j = 0; j < ps.userData.velocities.length; j++) {
      posAttr.array[j * 3] += ps.userData.velocities[j].x * delta;
      posAttr.array[j * 3 + 1] += ps.userData.velocities[j].y * delta;
      posAttr.array[j * 3 + 2] += ps.userData.velocities[j].z * delta;
      ps.userData.velocities[j].y -= 3 * delta;
    }
    posAttr.needsUpdate = true;
  }

  // ── Update feedback sprites ──
  for (let i = state.feedbacks.length - 1; i >= 0; i--) {
    const fb = state.feedbacks[i];
    fb.userData.life -= delta * 1.5;
    if (fb.userData.life <= 0) {
      scene.remove(fb);
      fb.material.dispose();
      fb.material.map.dispose();
      state.feedbacks.splice(i, 1);
      continue;
    }
    fb.position.y += delta * 0.5;
    fb.material.opacity = fb.userData.life;
  }

  // ── Position HUD relative to camera ──
  camera.getWorldPosition(cameraWorldPos);
  const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  hudSprite.position.copy(cameraWorldPos)
    .add(camDir.multiplyScalar(2.5))
    .add(new THREE.Vector3(0, 1.2, 0));
  hudSprite.quaternion.copy(camera.quaternion);

  // ── Update HUD ──
  updateHUD();

  // ── Animate arena lighting ──
  const beatPhase = ((now % (60000 / CONFIG.BPM)) / (60000 / CONFIG.BPM));
  const pulse = 0.5 + 0.5 * Math.pow(1 - beatPhase, 3);
  spotLight.intensity = 1.5 + pulse;
}

// ─────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────
renderer.setAnimationLoop(function (timestamp, frame) {
  gameLoop(timestamp, frame);
  renderer.render(scene, camera);
});

// ─────────────────────────────────────────────
// WEBXR SESSION MANAGEMENT
// ─────────────────────────────────────────────
const enterBtn = document.getElementById('enter-vr');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');

async function checkXR() {
  if (!navigator.xr) {
    statusEl.textContent = 'WebXR not supported in this browser.';
    enterBtn.textContent = 'WebXR Not Available';
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-vr');
  if (supported) {
    enterBtn.disabled = false;
    enterBtn.textContent = 'ENTER VR';
    statusEl.textContent = 'Put on your headset and press the button';
  } else {
    // Try inline mode for desktop testing
    enterBtn.disabled = false;
    enterBtn.textContent = 'START (Desktop Mode)';
    statusEl.textContent = 'No VR headset detected — desktop preview mode';
    enterBtn.dataset.mode = 'inline';
  }
}

enterBtn.addEventListener('click', async () => {
  initAudio();

  if (enterBtn.dataset.mode === 'inline') {
    // Desktop mode — just start the game without VR
    overlay.style.display = 'none';
    state.isPlaying = true;
    state.sessionStart = performance.now();
    state.lastBeatTime = performance.now();

    // Add mouse-based controller simulation for desktop
    initDesktopControls();
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking'],
    });

    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(session);

    overlay.style.display = 'none';
    state.isPlaying = true;
    state.sessionStart = performance.now();
    state.lastBeatTime = performance.now();

    session.addEventListener('end', () => {
      state.isPlaying = false;
      overlay.style.display = 'flex';
      showEndScreen();
    });

  } catch (err) {
    statusEl.textContent = `Failed to start VR: ${err.message}`;
  }
});

// ─────────────────────────────────────────────
// DESKTOP PREVIEW (for testing without headset)
// ─────────────────────────────────────────────
function initDesktopControls() {
  // Desktop overrides — relax thresholds for easy testing
  CONFIG.HIT_DISTANCE = 1.2;        // much larger hit zone
  CONFIG.MIN_PUNCH_VELOCITY = 0.0;  // no speed requirement
  CONFIG.TARGET_SPEED = 2.0;        // slower targets

  const mouse = new THREE.Vector2();
  let autoHitEnabled = true;
  const desktopClock = new THREE.Clock();

  // On-screen instructions
  const hint = document.createElement('div');
  hint.style.cssText = 'position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;' +
    'color:#888;font-size:13px;font-family:monospace;background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;';
  hint.innerHTML = 'Desktop Test Mode — <b>Mouse</b>: aim | <b>Click</b>: punch | <b>Space</b>: toggle auto-hit | <b>WASD</b>: move';
  document.body.appendChild(hint);

  // Auto-hit indicator
  const autoLabel = document.createElement('div');
  autoLabel.style.cssText = 'position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:20;' +
    'color:#0f0;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;';
  autoLabel.textContent = 'AUTO-HIT: ON';
  document.body.appendChild(autoLabel);

  // Crosshair cursor
  const crosshair = document.createElement('div');
  crosshair.style.cssText = 'position:fixed;width:20px;height:20px;pointer-events:none;z-index:25;' +
    'border:2px solid rgba(255,107,53,0.8);border-radius:50%;transform:translate(-50%,-50%);' +
    'box-shadow:0 0 10px rgba(255,107,53,0.3);';
  document.body.appendChild(crosshair);

  document.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    // Position crosshair
    crosshair.style.left = e.clientX + 'px';
    crosshair.style.top = e.clientY + 'px';

    // Move virtual controllers to match mouse in 3D space
    const x = mouse.x * 2;
    const y = 1.3 + mouse.y * 0.8;
    controllers[0].position.set(x - 0.15, y, -0.3);
    controllers[1].position.set(x + 0.15, y, -0.3);
  });

  // Click = manual punch (always set high velocity)
  document.addEventListener('click', () => {
    state.controllerVelocities[0].set(0, 0, -8);
    state.controllerVelocities[1].set(0, 0, -8);
    setTimeout(() => {
      state.controllerVelocities[0].set(0, 0, 0);
      state.controllerVelocities[1].set(0, 0, 0);
    }, 150);
  });

  // Space = toggle auto-hit
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      autoHitEnabled = !autoHitEnabled;
      autoLabel.textContent = 'AUTO-HIT: ' + (autoHitEnabled ? 'ON' : 'OFF');
      autoLabel.style.color = autoHitEnabled ? '#0f0' : '#f44';
    }
  });

  // WASD camera
  const keys = {};
  document.addEventListener('keydown', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = false; });

  // Desktop game loop — auto-hit nearby targets
  function desktopUpdate() {
    const dt = desktopClock.getDelta();

    // Camera movement
    const speed = 3 * dt;
    if (keys['w']) camera.position.z -= speed;
    if (keys['s']) camera.position.z += speed;
    if (keys['a']) camera.position.x -= speed;
    if (keys['d']) camera.position.x += speed;

    // Auto-hit: when targets get close, automatically punch them
    if (autoHitEnabled) {
      for (const target of state.targets) {
        if (target.userData.hit || !target.visible) continue;
        // Auto-hit when target is within reach (z > -1.0)
        if (target.position.z > -1.0) {
          // Teleport controller to target and set velocity
          const hand = target.userData.hand === 1 ? 1 : 0;
          controllers[hand].position.copy(target.position);
          controllers[hand].position.z += 0.1;
          state.controllerVelocities[hand].set(0, 0, -6);
          setTimeout(() => {
            state.controllerVelocities[hand].set(0, 0, 0);
          }, 80);
          break; // one per frame
        }
      }
    }

    requestAnimationFrame(desktopUpdate);
  }
  desktopUpdate();
}

      <div><span style="color:#00ff88; font-size:1.5rem;">${Math.round(state.calories)}</span><br><span style="color:#888;">Calories</span></div>
