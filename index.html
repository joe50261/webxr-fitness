<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Combat Fitness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 70%);
    }
    #overlay h1 {
      font-size: 3rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
    #enter-vr {
      padding: 1rem 2.5rem; font-size: 1.2rem;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, #ff6b35, #e8552a);
      color: #fff; font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #enter-vr:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,107,53,0.4); }
    #enter-vr:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    #status { margin-top: 1rem; color: #666; font-size: 0.9rem; }
    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 20;
      color: #0f0; font-family: monospace; font-size: 12px;
      background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>VR COMBAT FITNESS</h1>
  <p>WebXR 6DoF Rhythm Fighting</p>
  <button id="enter-vr" disabled>Checking WebXR...</button>
  <div id="status"></div>
  <div id="version" style="position:fixed;bottom:10px;right:10px;color:#444;font-size:12px;font-family:monospace;">v0.6.1-vr-toggle</div>
</div>

<div id="debug"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ╔══════════════════════════════════════════════╗
// ║  ENGINE — pure data & logic, no Three.js     ║
// ╚══════════════════════════════════════════════╝
class Engine {
  constructor() {
    this.config = {
      SPAWN_DISTANCE: 5,
      HIT_DISTANCE: 0.6,
      TARGET_SPEED: 3.0,
      TARGET_RADIUS: 0.15,

      PERFECT_THRESHOLD: 0.08,
      GREAT_THRESHOLD: 0.15,
      GOOD_THRESHOLD: 0.3,
      MISS_DISTANCE: 2.0,

      BPM: 128,
      BEATS_PER_SPAWN: 2,

      MET_VALUE: 6.0,
      USER_WEIGHT_KG: 70,

      MIN_PUNCH_VELOCITY: 0.8,

      LEFT_COLOR: 0x4488ff,
      RIGHT_COLOR: 0xff4444,
      PERFECT_COLOR: 0xffd700,
      GREAT_COLOR: 0x00ff88,
      GOOD_COLOR: 0x44aaff,
      MISS_COLOR: 0xff2222,

      INK_RESIDUE_LIFETIME: 30,
      INK_RESIDUE_FADE_TIME: 5,
      MAX_RESIDUE_MARKS: 100,

      ANCHOR_SIZE: 0.12,
      CALIBRATION_HOLD_TIME: 3.0,
      CALIBRATION_VELOCITY_THRESHOLD: 0.15,
    };

    this.punchTypes = {
      jab:      { dir: [0, 0, -1], label: 'JAB' },
      cross:    { dir: [0, 0, -1], label: 'CROSS' },
      hook_l:   { dir: [1, 0, 0],  label: 'HOOK' },
      hook_r:   { dir: [-1, 0, 0], label: 'HOOK' },
      uppercut: { dir: [0, 1, 0],  label: 'UPPER' },
    };

    this.patterns = [
      { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'jab' }],      name: 'left_jab' },
      { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'cross' }],     name: 'right_cross' },
      { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'hook_l' }],   name: 'left_hook' },
      { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'hook_r' }],    name: 'right_hook' },
      { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'uppercut' }], name: 'left_upper' },
      { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'uppercut' }],  name: 'right_upper' },
    ];

    this.calibration = {
      done: false,
      left:  { x: -0.5, y: 1.3, z: -0.3 },
      right: { x: 0.5, y: 1.3, z: -0.3 },
      steadyStart: [0, 0],
    };

    this.state = {
      phase: 'idle', // 'idle' | 'calibrating' | 'playing'
      metronome: false, // true = beat-driven arrival timing
      score: 0,
      combo: 0,
      maxCombo: 0,
      hits: { perfect: 0, great: 0, good: 0, weak: 0, miss: 0 },
      totalPunches: 0,
      calories: 0,
      sessionStart: 0,
      beatIndex: 0,
      lastBeatTime: 0,
      nextTargetId: 0,
    };

    // Controller data (written by renderer/input each frame)
    this.controllers = [
      { pos: [0, 0, 0], vel: [0, 0, 0], prevPos: [0, 0, 0], inited: false },
      { pos: [0, 0, 0], vel: [0, 0, 0], prevPos: [0, 0, 0], inited: false },
    ];

    // Target data (pure objects, no Three.js)
    this.targets = [];

    // Hit result log (renderer reads to draw ink lines)
    this.hitLog = [];
    // Events
    this._listeners = {};
  }

  // ── Event system ──
  on(event, fn) {
    (this._listeners[event] ||= []).push(fn);
  }
  emit(event, data) {
    for (const fn of this._listeners[event] || []) fn(data);
  }

  // ── Beat timing ──
  beatIntervalMs() {
    return (60 / this.config.BPM) * this.config.BEATS_PER_SPAWN * 1000;
  }
  travelDuration() {
    // Time for target to travel from spawn to anchor Z
    const anchorZ = (this.calibration.left.z + this.calibration.right.z) / 2;
    return (this.config.SPAWN_DISTANCE + Math.abs(anchorZ)) / this.config.TARGET_SPEED;
  }

  // ── Scoring ──
  evaluateHit(distance, punchVel, expectedDir) {
    const C = this.config;
    let distLabel, distScore;
    if (distance < C.PERFECT_THRESHOLD) { distLabel = 'PERFECT'; distScore = 100; }
    else if (distance < C.GREAT_THRESHOLD) { distLabel = 'GREAT'; distScore = 75; }
    else if (distance < C.GOOD_THRESHOLD) { distLabel = 'GOOD'; distScore = 50; }
    else if (distance < C.HIT_DISTANCE) { distLabel = 'WEAK'; distScore = 20; }
    else return null;

    let angleAccuracy = 1.0;
    if (expectedDir) {
      const vLen = Math.sqrt(punchVel[0]**2 + punchVel[1]**2 + punchVel[2]**2);
      if (vLen > 0.1) {
        const nx = punchVel[0]/vLen, ny = punchVel[1]/vLen, nz = punchVel[2]/vLen;
        angleAccuracy = Math.max(0, nx*expectedDir[0] + ny*expectedDir[1] + nz*expectedDir[2]);
      }
    }

    const score = Math.round(distScore * (0.5 + 0.5 * angleAccuracy));
    const breaksCombo = distLabel === 'WEAK' || angleAccuracy < 0.15;
    const label = angleAccuracy < 0.15 ? 'WEAK' :
                  angleAccuracy < 0.4 ? (distLabel === 'PERFECT' ? 'GREAT' : distLabel) :
                  distLabel;
    const color = label === 'PERFECT' ? C.PERFECT_COLOR :
                  label === 'GREAT' ? C.GREAT_COLOR :
                  label === 'GOOD' ? C.GOOD_COLOR : 0x886644;

    return { label, score, color, angleAccuracy, breaksCombo };
  }

  // ── Calibration ──
  startCalibration() {
    this.state.phase = 'calibrating';
    const now = performance.now();
    this.calibration.steadyStart[0] = now;
    this.calibration.steadyStart[1] = now;
  }

  updateCalibration(delta) {
    const now = performance.now();
    const C = this.config;

    // Anchors follow controllers
    this.calibration.left.x = this.controllers[0].pos[0];
    this.calibration.left.y = this.controllers[0].pos[1];
    this.calibration.left.z = this.controllers[0].pos[2];
    this.calibration.right.x = this.controllers[1].pos[0];
    this.calibration.right.y = this.controllers[1].pos[1];
    this.calibration.right.z = this.controllers[1].pos[2];

    // Check velocity
    let bothSteady = true;
    for (let i = 0; i < 2; i++) {
      const v = this.controllers[i].vel;
      const speed = Math.sqrt(v[0]**2 + v[1]**2 + v[2]**2);
      if (speed > C.CALIBRATION_VELOCITY_THRESHOLD) {
        this.calibration.steadyStart[i] = now;
        bothSteady = false;
      }
    }

    const minSteady = Math.min(
      now - this.calibration.steadyStart[0],
      now - this.calibration.steadyStart[1]
    );
    const progress = minSteady / (C.CALIBRATION_HOLD_TIME * 1000);

    this.emit('calibrationProgress', { progress, steady: bothSteady });

    if (progress >= 1 && bothSteady) {
      this.calibration.done = true;
      // Update patterns
      for (const pat of this.patterns) {
        for (const pos of pat.positions) {
          const cal = pos.hand === 0 ? this.calibration.left : this.calibration.right;
          pos.x = cal.x;
          pos.y = cal.y;
        }
      }
      this.emit('calibrationDone', this.calibration);
      this.startPlaying();
    }
  }

  startPlaying() {
    this.state.phase = 'playing';
    this.state.sessionStart = performance.now();
    this.state.lastBeatTime = performance.now();
  }

  // ── Spawn ──
  spawnTarget() {
    const pat = this.patterns[Math.floor(Math.random() * this.patterns.length)];
    for (const pos of pat.positions) {
      const punch = this.punchTypes[pos.punch || 'jab'];
      const id = this.state.nextTargetId++;
      this.targets.push({
        id,
        x: pos.x, y: pos.y, z: -this.config.SPAWN_DISTANCE,
        hand: pos.hand,
        punchType: pos.punch || 'jab',
        expectedDir: punch.dir.slice(),
        hit: false,
        tracking: null,
        spawnTime: performance.now(),
      });
      this.emit('targetSpawned', this.targets[this.targets.length - 1]);
    }
  }

  // ── Main update ──
  update(delta) {
    if (this.state.phase === 'calibrating') {
      this.updateControllerVelocities(delta);
      this.updateCalibration(delta);
      return;
    }
    if (this.state.phase !== 'playing') return;

    const now = performance.now();
    const C = this.config;

    // Beat spawning
    if (this.state.metronome) {
      // Metronome mode: schedule spawn so target arrives at anchor on beat
      const beatMs = this.beatIntervalMs();
      const nextBeatTime = this.state.lastBeatTime + beatMs;
      const spawnLeadTime = this.travelDuration() * 1000;
      if (now >= nextBeatTime - spawnLeadTime && now - this.state.lastBeatTime >= beatMs * 0.5) {
        this.state.lastBeatTime = nextBeatTime;
        this.state.beatIndex++;
        this.spawnTarget();
        this.emit('beat', this.state.beatIndex);
      }
    } else {
      // Free mode: spawn on beat tick
      if (now - this.state.lastBeatTime > this.beatIntervalMs()) {
        this.state.lastBeatTime = now;
        this.state.beatIndex++;
        this.spawnTarget();
        this.emit('beat', this.state.beatIndex);
      }
    }

    this.updateControllerVelocities(delta);

    // Update targets
    for (let i = this.targets.length - 1; i >= 0; i--) {
      const t = this.targets[i];
      if (t.hit) { this.targets.splice(i, 1); continue; }

      // Move toward player
      t.z += C.TARGET_SPEED * delta;

      // Scale-in (renderer reads this)
      if (!t.scaleReady && t.z > -C.SPAWN_DISTANCE + 1) t.scaleReady = true;

      // Skip collision if far
      if (t.z < -C.HIT_DISTANCE * 2) continue;

      // Closest-approach collision
      this.processCollision(t, i);

      // Miss check
      if (!t.hit && t.z > C.MISS_DISTANCE) {
        this.onMiss(t, i);
      }
    }

    // Calories
    const elapsed = (now - this.state.sessionStart) / 1000;
    this.state.calories = (C.MET_VALUE * C.USER_WEIGHT_KG * 3.5 / 200) * (elapsed / 60);
  }

  updateControllerVelocities(delta) {
    if (delta <= 0) return;
    for (let i = 0; i < 2; i++) {
      const c = this.controllers[i];
      if (c.inited) {
        c.vel[0] = (c.pos[0] - c.prevPos[0]) / delta;
        c.vel[1] = (c.pos[1] - c.prevPos[1]) / delta;
        c.vel[2] = (c.pos[2] - c.prevPos[2]) / delta;
      }
      c.prevPos[0] = c.pos[0];
      c.prevPos[1] = c.pos[1];
      c.prevPos[2] = c.pos[2];
      c.inited = true;
    }
  }

  processCollision(t, idx) {
    const C = this.config;
    for (let c = 0; c < 2; c++) {
      if (t.hand !== -1 && t.hand !== c) continue;

      const ctrl = this.controllers[c];
      const dx = ctrl.pos[0] - t.x, dy = ctrl.pos[1] - t.y, dz = ctrl.pos[2] - t.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const speed = Math.sqrt(ctrl.vel[0]**2 + ctrl.vel[1]**2 + ctrl.vel[2]**2);

      if (dist < C.HIT_DISTANCE && speed > C.MIN_PUNCH_VELOCITY) {
        if (!t.tracking) {
          t.tracking = {
            controller: c, minDist: dist, frames: 0,
            hitPos: ctrl.pos.slice(),
          };
        } else if (t.tracking.controller === c) {
          if (dist < t.tracking.minDist) {
            t.tracking.minDist = dist;
            t.tracking.hitPos = ctrl.pos.slice();
            t.tracking.frames = 0;
          } else {
            t.tracking.frames++;
          }
          if (t.tracking.frames >= 2) {
            this.onHit(t, idx, c, t.tracking.minDist, t.tracking.hitPos);
            return;
          }
        }
      } else if (t.tracking && t.tracking.controller === c) {
        this.onHit(t, idx, c, t.tracking.minDist, t.tracking.hitPos);
        return;
      }
    }
  }

  onHit(t, idx, controllerIndex, distance, hitPos) {
    const result = this.evaluateHit(distance, this.controllers[controllerIndex].vel, t.expectedDir);
    if (!result) return;

    t.hit = true;
    this.targets.splice(idx, 1);

    if (result.breaksCombo) { this.state.combo = 0; }
    else { this.state.combo++; }
    if (this.state.combo > this.state.maxCombo) this.state.maxCombo = this.state.combo;

    const comboMult = 1 + Math.floor(this.state.combo / 10) * 0.5;
    const points = Math.round(result.score * comboMult);
    this.state.score += points;
    this.state.totalPunches++;
    this.state.hits[result.label.toLowerCase()]++;

    const anchor = controllerIndex === 0 ? this.calibration.left : this.calibration.right;
    const handColor = controllerIndex === 0 ? this.config.LEFT_COLOR : this.config.RIGHT_COLOR;

    this.hitLog.push({
      hitPos: hitPos.slice(),
      anchorPos: [anchor.x, anchor.y, anchor.z],
      color: handColor,
      label: result.label,
      time: performance.now(),
    });

    this.emit('hit', {
      target: t, controllerIndex, distance, hitPos,
      result, points, anchorPos: [anchor.x, anchor.y, anchor.z], handColor,
    });
  }

  onMiss(t, idx) {
    t.hit = true;
    this.targets.splice(idx, 1);
    this.state.combo = 0;
    this.state.hits.miss++;
    this.emit('miss', { target: t });
  }
}

// ╔══════════════════════════════════════════════╗
// ║  RENDERER — Three.js visuals, reads engine   ║
// ╚══════════════════════════════════════════════╝
class GameRenderer {
  constructor(engine) {
    this.engine = engine;
    this.C = engine.config;

    // Three.js setup
    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.xr.enabled = true;
    this.renderer.xr.cameraAutoUpdate = true;
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.2;
    document.body.appendChild(this.renderer.domElement);

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x050510);
    this.scene.fog = new THREE.Fog(0x050510, 8, 25);

    this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
    this.camera.position.set(0, 1.6, 0);

    this.clock = new THREE.Clock();
    this.tmpVec = new THREE.Vector3();
    this.cameraWorldPos = new THREE.Vector3();
    this.ctrlWorldPos = [new THREE.Vector3(), new THREE.Vector3()];

    this.feedbacks = [];
    this.inkLines = [];
    this.targetMeshMap = new Map();

    this._createLights();
    this._createArena();
    this._createControllers();
    this._createTargetPool();
    this._createAnchors();
    this._createHUD();
    this._createCalibHUD();
    this._initAudio();
    this._bindEvents();
  }

  // ── Lights ──
  _createLights() {
    this.scene.add(new THREE.AmbientLight(0x222244, 0.5));
    const spot = new THREE.SpotLight(0xff6b35, 2, 20, Math.PI / 4, 0.5);
    spot.position.set(0, 5, -2);
    this.scene.add(spot);
    this.spotLight = spot;
    const p1 = new THREE.PointLight(0x4488ff, 1, 15);
    p1.position.set(-3, 3, -5);
    this.scene.add(p1);
    const p2 = new THREE.PointLight(0xff4444, 1, 15);
    p2.position.set(3, 3, -5);
    this.scene.add(p2);
  }

  // ── Arena ──
  _createArena() {
    const C = this.C;
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.2, metalness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    this.scene.add(floor);

    const grid = new THREE.GridHelper(20, 40, 0x222244, 0x111133);
    grid.position.y = 0.01;
    this.scene.add(grid);

    for (let side = -1; side <= 1; side += 2) {
      const mat = new THREE.MeshStandardMaterial({
        color: side === -1 ? 0x4488ff : 0xff4444,
        emissive: side === -1 ? 0x2244aa : 0xaa2222, emissiveIntensity: 0.5,
      });
      for (let z = -8; z <= -2; z += 3) {
        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4, 8), mat);
        pillar.position.set(side * 3, 2, z);
        this.scene.add(pillar);
      }
    }

    const stripMat = new THREE.MeshStandardMaterial({ color: 0xff6b35, emissive: 0xff6b35, emissiveIntensity: 0.3 });
    for (let side = -1; side <= 1; side += 2) {
      const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.02, 12), stripMat);
      strip.position.set(side * 1.5, 0.01, -4);
      this.scene.add(strip);
    }

    const wallMat = new THREE.MeshStandardMaterial({
      color: 0x0a0a18, roughness: 0.6, metalness: 0.2, transparent: true, opacity: 0.85,
    });
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), wallMat);
    wall.position.set(0, 2, C.MISS_DISTANCE + 0.5);
    this.scene.add(wall);
    const border = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(8, 4)),
      new THREE.LineBasicMaterial({ color: 0x332244, transparent: true, opacity: 0.5 })
    );
    border.position.copy(wall.position);
    this.scene.add(border);
  }

  // ── Controllers ──
  _createControllers() {
    const factory = new XRControllerModelFactory();
    this.xrControllers = [];
    this.gloves = [];
    for (let i = 0; i < 2; i++) {
      const ctrl = this.renderer.xr.getController(i);
      this.scene.add(ctrl);
      this.xrControllers.push(ctrl);

      ctrl.addEventListener('connected', (e) => { ctrl.userData.inputSource = e.data; });
      ctrl.addEventListener('disconnected', () => { ctrl.userData.inputSource = null; });
      ctrl.addEventListener('squeezestart', () => {
        this.engine.state.metronome = !this.engine.state.metronome;
        this._hudPrev.score = -1;
      });

      const grip = this.renderer.xr.getControllerGrip(i);
      grip.add(factory.createControllerModel(grip));
      this.scene.add(grip);

      const color = i === 0 ? this.C.LEFT_COLOR : this.C.RIGHT_COLOR;
      const glove = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 0.4, transparent: true, opacity: 0.7,
        })
      );
      ctrl.add(glove);
      this.gloves.push(glove);

      // Trail
      const trailGeo = new THREE.BufferGeometry();
      trailGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(30 * 3), 3));
      const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 }));
      trail.frustumCulled = false;
      this.scene.add(trail);
      ctrl.userData.trail = trail;
      ctrl.userData.trailIndex = 0;
    }
  }

  // ── Target pool ──
  _createTargetPool() {
    this.targetPool = [];
    const C = this.C;
    const discGeo = new THREE.CircleGeometry(C.TARGET_RADIUS, 24);
    const ringGeo = new THREE.RingGeometry(C.TARGET_RADIUS * 0.85, C.TARGET_RADIUS, 24);
    this._targetDiscGeo = discGeo;
    this._targetRingGeo = ringGeo;

    const makeDisc = (c) => new THREE.MeshStandardMaterial({
      color: c, emissive: c, emissiveIntensity: 0.5, transparent: true, opacity: 0.9, side: THREE.DoubleSide,
    });
    const makeRing = () => new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide,
    });
    this._targetMats = {
      left: { disc: makeDisc(C.LEFT_COLOR), ring: makeRing() },
      right: { disc: makeDisc(C.RIGHT_COLOR), ring: makeRing() },
    };

    for (let i = 0; i < 20; i++) this.targetPool.push(this._makeTargetMesh());
  }

  _makeTargetMesh() {
    const g = new THREE.Group();
    const disc = new THREE.Mesh(this._targetDiscGeo, this._targetMats.left.disc);
    g.add(disc); g.userData.disc = disc;
    const ring = new THREE.Mesh(this._targetRingGeo, this._targetMats.left.ring);
    g.add(ring); g.userData.ring = ring;
    g.visible = false;
    this.scene.add(g);
    return g;
  }

  _getPooledTarget() {
    for (const t of this.targetPool) { if (!t.visible) return t; }
    const t = this._makeTargetMesh();
    this.targetPool.push(t);
    return t;
  }

  // ── Anchors ──
  _createAnchors() {
    const geo = new THREE.RingGeometry(0.9, 1.0, 24);
    this.anchorMeshes = [];
    for (let i = 0; i < 2; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color: i === 0 ? this.C.LEFT_COLOR : this.C.RIGHT_COLOR,
        transparent: true, opacity: 0.4, depthWrite: false, side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.scale.setScalar(this.C.ANCHOR_SIZE);
      this.scene.add(mesh);
      this.anchorMeshes.push(mesh);
    }
    this.updateAnchors();
  }

  updateAnchors() {
    const cal = this.engine.calibration;
    for (let i = 0; i < 2; i++) {
      const p = i === 0 ? cal.left : cal.right;
      this.anchorMeshes[i].position.set(p.x, p.y, p.z);
      this.anchorMeshes[i].lookAt(p.x, p.y, p.z + 1);
    }
  }

  // ── HUD ──
  _createHUD() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 256;
    this._hudCtx = canvas.getContext('2d');
    this._hudTexture = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: this._hudTexture, transparent: true, depthTest: false });
    this._hudSprite = new THREE.Sprite(mat);
    this._hudSprite.scale.set(1.5, 0.75, 1);
    this.scene.add(this._hudSprite);
    this._hudPrev = { score: -1, combo: -1, seconds: -1, miss: -1 };
  }

  updateHUD() {
    const s = this.engine.state;
    const elapsed = s.sessionStart > 0 ? (performance.now() - s.sessionStart) / 1000 : 0;
    const curSec = Math.floor(elapsed);
    if (this._hudPrev.score === s.score && this._hudPrev.combo === s.combo &&
        this._hudPrev.seconds === curSec && this._hudPrev.miss === s.hits.miss) return;
    Object.assign(this._hudPrev, { score: s.score, combo: s.combo, seconds: curSec, miss: s.hits.miss });

    const ctx = this._hudCtx;
    ctx.clearRect(0, 0, 512, 256);
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.roundRect(10, 10, 492, 236, 15); ctx.fill();

    ctx.font = 'bold 42px Segoe UI, sans-serif'; ctx.fillStyle = '#ff6b35'; ctx.textAlign = 'left';
    ctx.fillText(s.score.toLocaleString(), 30, 65);
    if (s.combo > 1) { ctx.font = 'bold 28px Segoe UI, sans-serif'; ctx.fillStyle = '#ffd700'; ctx.fillText(`${s.combo}x COMBO`, 30, 105); }

    ctx.font = '18px Segoe UI, sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText(`Time: ${Math.floor(curSec/60)}:${(curSec%60).toString().padStart(2,'0')}`, 30, 145);
    ctx.fillText(`Cal: ${Math.round(s.calories)} kcal`, 30, 175);

    const totalHits = s.hits.perfect + s.hits.great + s.hits.good + s.hits.weak;
    const acc = (totalHits + s.hits.miss) > 0 ? Math.round(totalHits / (totalHits + s.hits.miss) * 100) : 100;
    ctx.fillText(`Accuracy: ${acc}%`, 30, 205);

    // Mode indicator
    ctx.fillStyle = this.engine.state.metronome ? '#00ff88' : '#888';
    ctx.fillText(this.engine.state.metronome ? 'METRONOME' : 'FREE', 30, 235);

    ctx.textAlign = 'right'; ctx.font = '16px Segoe UI, sans-serif';
    ctx.fillStyle = '#ffd700'; ctx.fillText(`Perfect: ${s.hits.perfect}`, 480, 145);
    ctx.fillStyle = '#00ff88'; ctx.fillText(`Great: ${s.hits.great}`, 480, 170);
    ctx.fillStyle = '#44aaff'; ctx.fillText(`Good: ${s.hits.good}`, 480, 195);
    ctx.fillStyle = '#886644'; ctx.fillText(`Weak: ${s.hits.weak}`, 480, 220);
    ctx.fillStyle = '#ff2222'; ctx.fillText(`Miss: ${s.hits.miss}`, 480, 245);

    this._hudTexture.needsUpdate = true;
  }

  // ── Calibration HUD ──
  _createCalibHUD() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 128;
    this._calibCtx = canvas.getContext('2d');
    this._calibTexture = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: this._calibTexture, transparent: true, depthTest: false });
    this._calibSprite = new THREE.Sprite(mat);
    this._calibSprite.scale.set(1.5, 0.4, 1);
    this._calibSprite.visible = false;
    this.scene.add(this._calibSprite);
  }

  updateCalibHUD(progress, steady) {
    const ctx = this._calibCtx;
    ctx.clearRect(0, 0, 512, 128);
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.roundRect(10, 10, 492, 108, 12); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(30, 85, 452, 16);
    ctx.fillStyle = progress >= 1 ? '#00ff88' : '#ff6b35';
    ctx.fillRect(30, 85, 452 * Math.min(progress, 1), 16);
    ctx.font = 'bold 28px Segoe UI, sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(steady ? 'Hold steady...' : 'Extend arms forward', 256, 60);
    this._calibTexture.needsUpdate = true;

    this.camera.getWorldPosition(this.cameraWorldPos);
    this.tmpVec.set(0, 0, -1).applyQuaternion(this.camera.quaternion);
    this._calibSprite.position.copy(this.cameraWorldPos).add(this.tmpVec.multiplyScalar(2.0)).add(new THREE.Vector3(0, 1.2, 0));
    this._calibSprite.quaternion.copy(this.camera.quaternion);
    this._calibSprite.visible = true;
  }

  hideCalibHUD() { this._calibSprite.visible = false; }

  // ── Audio ──
  _initAudio() { this.audioCtx = null; }
  ensureAudio() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  playBeatTick() {
    if (!this.audioCtx) return;
    const osc = this.audioCtx.createOscillator(), gain = this.audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.05);
    osc.connect(gain); gain.connect(this.audioCtx.destination);
    osc.start(); osc.stop(this.audioCtx.currentTime + 0.05);
  }
  playHitSound() {
    if (!this.audioCtx) return;
    const osc = this.audioCtx.createOscillator(), gain = this.audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = 220;
    gain.gain.setValueAtTime(0.15, this.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(this.audioCtx.destination);
    osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
  }

  // ── Feedback sprites ──
  showFeedback(pos, label, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.font = 'bold 48px Segoe UI, sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.fillText(label, 128, 72);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
    sprite.position.set(pos[0], pos[1] + 0.3, pos[2]);
    sprite.scale.set(0.8, 0.4, 1);
    sprite.userData.life = 1.0;
    this.scene.add(sprite);
    this.feedbacks.push(sprite);
  }

  // ── Ink lines ──
  createInkLine(hitPos, anchorPos, color, label) {
    const C = this.C;
    while (this.inkLines.length >= C.MAX_RESIDUE_MARKS) {
      const old = this.inkLines.shift();
      this.scene.remove(old); old.geometry.dispose(); old.material.dispose();
    }
    const opacity = label === 'PERFECT' ? 0.95 : label === 'GREAT' ? 0.75 : label === 'GOOD' ? 0.5 : 0.25;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(anchorPos[0], anchorPos[1], anchorPos[2]),
      new THREE.Vector3(hitPos[0], hitPos[1], hitPos[2]),
    ]);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
    const line = new THREE.Line(geo, mat);
    line.userData = { spawnTime: performance.now(), lifetime: C.INK_RESIDUE_LIFETIME * 1000,
      fadeTime: C.INK_RESIDUE_FADE_TIME * 1000, baseOpacity: opacity };
    this.scene.add(line);
    this.inkLines.push(line);
  }

  // ── Haptic ──
  pulseHaptic(controllerIndex) {
    const src = this.xrControllers[controllerIndex]?.userData?.inputSource;
    if (src?.gamepad?.hapticActuators?.length > 0) {
      src.gamepad.hapticActuators[0].pulse(0.8, 100);
    }
  }

  // ── Bind engine events ──
  _bindEvents() {
    const eng = this.engine;
    eng.on('hit', (d) => {
      this.createInkLine(d.hitPos, d.anchorPos, d.handColor, d.result.label);
      const tag = d.result.angleAccuracy < 0.4 ? ' ✕' : '';
      this.showFeedback([d.target.x, d.target.y, d.target.z], `${d.result.label} +${d.points}${tag}`, d.result.color);
      this.playHitSound();
      this.pulseHaptic(d.controllerIndex);
      if (this.gloves[d.controllerIndex]) this.gloves[d.controllerIndex].scale.setScalar(1.5);
    });
    eng.on('miss', (d) => {
      this.showFeedback([d.target.x, d.target.y, d.target.z], 'MISS', eng.config.MISS_COLOR);
    });
    eng.on('beat', () => { this.playBeatTick(); });
    eng.on('calibrationProgress', (d) => { this.updateCalibHUD(d.progress, d.steady); this.updateAnchors(); });
    eng.on('calibrationDone', () => { this.hideCalibHUD(); this.updateAnchors(); });
  }

  // ── Read XR controllers into engine ──
  readControllers() {
    for (let i = 0; i < 2; i++) {
      const ctrl = this.xrControllers[i];
      const wp = this.ctrlWorldPos[i];
      ctrl.getWorldPosition(wp);
      this.engine.controllers[i].pos[0] = wp.x;
      this.engine.controllers[i].pos[1] = wp.y;
      this.engine.controllers[i].pos[2] = wp.z;
    }
  }

  // ── Sync target visuals to engine data ──
  syncTargets() {
    const eng = this.engine;
    const alive = new Set();

    for (const t of eng.targets) {
      alive.add(t.id);
      let mesh = this.targetMeshMap.get(t.id);
      if (!mesh) {
        mesh = this._getPooledTarget();
        const variant = t.hand === 0 ? 'left' : 'right';
        mesh.userData.disc.material = this._targetMats[variant].disc;
        mesh.userData.ring.material = this._targetMats[variant].ring;
        // Orient disc by punch type
        const dir = t.expectedDir;
        mesh.quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 0, 1),
          new THREE.Vector3(-dir[0], -dir[1], -dir[2])
        );
        mesh.visible = true;
        this.targetMeshMap.set(t.id, mesh);
      }
      mesh.position.set(t.x, t.y, t.z);
      // Scale-in
      const age = (performance.now() - t.spawnTime) / 1000;
      const s = Math.min(age * 5, 1);
      mesh.scale.setScalar(s);
    }

    // Hide removed targets
    for (const [id, mesh] of this.targetMeshMap) {
      if (!alive.has(id)) {
        mesh.visible = false;
        this.targetMeshMap.delete(id);
      }
    }
  }

  // ── Main render update ──
  update(delta) {
    const eng = this.engine;
    const now = performance.now();

    // Sync target meshes
    this.syncTargets();

    // Update trails
    for (let i = 0; i < 2; i++) {
      const ctrl = this.xrControllers[i];
      const wp = this.ctrlWorldPos[i];
      const trail = ctrl.userData.trail;
      if (trail) {
        const attr = trail.geometry.getAttribute('position');
        const idx = (ctrl.userData.trailIndex % 30) * 3;
        attr.array[idx] = wp.x; attr.array[idx+1] = wp.y; attr.array[idx+2] = wp.z;
        attr.needsUpdate = true;
        ctrl.userData.trailIndex++;
      }
      // Glove pulse decay
      const g = this.gloves[i];
      if (g && g.scale.x > 1.0) { g.scale.multiplyScalar(0.9); if (g.scale.x < 1.01) g.scale.setScalar(1.0); }
    }

    // Feedback sprites
    for (let i = this.feedbacks.length - 1; i >= 0; i--) {
      const fb = this.feedbacks[i];
      fb.userData.life -= delta * 1.5;
      if (fb.userData.life <= 0) {
        this.scene.remove(fb); fb.material.dispose(); fb.material.map.dispose();
        this.feedbacks.splice(i, 1);
      } else { fb.position.y += delta * 0.5; fb.material.opacity = fb.userData.life; }
    }

    // Ink line fade
    for (let i = this.inkLines.length - 1; i >= 0; i--) {
      const r = this.inkLines[i];
      const remaining = r.userData.lifetime - (now - r.userData.spawnTime);
      if (remaining <= 0) {
        this.scene.remove(r); r.geometry.dispose(); r.material.dispose();
        this.inkLines.splice(i, 1);
      } else if (remaining < r.userData.fadeTime) {
        r.material.opacity = r.userData.baseOpacity * (remaining / r.userData.fadeTime);
      }
    }

    // HUD position + update
    if (eng.state.phase === 'playing') {
      this.camera.getWorldPosition(this.cameraWorldPos);
      this.tmpVec.set(0, 0, -1).applyQuaternion(this.camera.quaternion);
      this._hudSprite.position.copy(this.cameraWorldPos).add(this.tmpVec.multiplyScalar(2.5)).add(new THREE.Vector3(0, 1.2, 0));
      this._hudSprite.quaternion.copy(this.camera.quaternion);
      this._hudSprite.visible = true;
      this.updateHUD();
    } else {
      this._hudSprite.visible = false;
    }

    // Beat lighting pulse
    if (eng.state.phase === 'playing') {
      const beatPhase = ((now % (60000 / eng.config.BPM)) / (60000 / eng.config.BPM));
      this.spotLight.intensity = 1.5 + 0.5 + 0.5 * Math.pow(1 - beatPhase, 3);
    }
  }
}

// ╔══════════════════════════════════════════════╗
// ║  MAIN — wire Engine + Renderer               ║
// ╚══════════════════════════════════════════════╝
const engine = new Engine();
const gfx = new GameRenderer(engine);

// ── Main loop ──
gfx.renderer.setAnimationLoop((timestamp, frame) => {
  const delta = gfx.clock.getDelta();
  gfx.readControllers();
  engine.update(delta);
  gfx.update(delta);
  gfx.renderer.render(gfx.scene, gfx.camera);
});

// ── WebXR session ──
const enterBtn = document.getElementById('enter-vr');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');

async function checkXR() {
  if (!navigator.xr) {
    statusEl.textContent = 'WebXR not supported in this browser.';
    enterBtn.textContent = 'WebXR Not Available';
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-vr');
  if (supported) {
    enterBtn.disabled = false;
    enterBtn.textContent = 'ENTER VR';
    statusEl.textContent = 'Put on your headset and press the button';
  } else {
    enterBtn.disabled = false;
    enterBtn.textContent = 'START (Desktop Mode)';
    statusEl.textContent = 'No VR headset detected — desktop preview mode';
    enterBtn.dataset.mode = 'inline';
  }
}

enterBtn.addEventListener('click', async () => {
  gfx.ensureAudio();

  if (enterBtn.dataset.mode === 'inline') {
    overlay.style.display = 'none';
    engine.startPlaying();
    initDesktopControls();
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking'],
    });
    gfx.renderer.xr.setReferenceSpaceType('local-floor');
    await gfx.renderer.xr.setSession(session);
    overlay.style.display = 'none';
    engine.startCalibration();

    session.addEventListener('end', () => {
      engine.state.phase = 'idle';
      overlay.style.display = 'flex';
      showEndScreen();
    });
  } catch (err) {
    statusEl.textContent = `Failed to start VR: ${err.message}`;
  }
});

// ── Toggle metronome with M key ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'm') {
    engine.state.metronome = !engine.state.metronome;
    gfx._hudPrev.score = -1; // force HUD redraw
  }
});

// ── Desktop mode ──
function initDesktopControls() {
  engine.config.HIT_DISTANCE = 1.2;
  engine.config.MIN_PUNCH_VELOCITY = 0.0;
  engine.config.TARGET_SPEED = 2.0;

  let autoHitEnabled = true;
  const desktopClock = new THREE.Clock();

  const hint = document.createElement('div');
  hint.style.cssText = 'position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;color:#888;font-size:13px;font-family:monospace;background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;';
  hint.innerHTML = 'Desktop — <b>Mouse</b>: aim | <b>Click</b>: punch | <b>Space</b>: auto-hit | <b>M</b>: metronome | <b>WASD</b>: move';
  document.body.appendChild(hint);

  const autoLabel = document.createElement('div');
  autoLabel.style.cssText = 'position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:20;color:#0f0;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;';
  autoLabel.textContent = 'AUTO-HIT: ON';
  document.body.appendChild(autoLabel);

  const crosshair = document.createElement('div');
  crosshair.style.cssText = 'position:fixed;width:20px;height:20px;pointer-events:none;z-index:25;border:2px solid rgba(255,107,53,0.8);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(255,107,53,0.3);';
  document.body.appendChild(crosshair);

  document.addEventListener('mousemove', (e) => {
    const mx = (e.clientX / window.innerWidth) * 2 - 1;
    const my = -(e.clientY / window.innerHeight) * 2 + 1;
    crosshair.style.left = e.clientX + 'px'; crosshair.style.top = e.clientY + 'px';
    const x = mx * 2, y = 1.3 + my * 0.8;
    gfx.xrControllers[0].position.set(x - 0.15, y, -0.3);
    gfx.xrControllers[1].position.set(x + 0.15, y, -0.3);
  });

  document.addEventListener('click', () => {
    engine.controllers[0].vel = [0, 0, -8];
    engine.controllers[1].vel = [0, 0, -8];
    setTimeout(() => { engine.controllers[0].vel = [0,0,0]; engine.controllers[1].vel = [0,0,0]; }, 150);
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault(); autoHitEnabled = !autoHitEnabled;
      autoLabel.textContent = 'AUTO-HIT: ' + (autoHitEnabled ? 'ON' : 'OFF');
      autoLabel.style.color = autoHitEnabled ? '#0f0' : '#f44';
    }
  });

  const keys = {};
  document.addEventListener('keydown', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = false; });

  function desktopUpdate() {
    const dt = desktopClock.getDelta();
    const spd = 3 * dt;
    if (keys['w']) gfx.camera.position.z -= spd;
    if (keys['s']) gfx.camera.position.z += spd;
    if (keys['a']) gfx.camera.position.x -= spd;
    if (keys['d']) gfx.camera.position.x += spd;

    if (autoHitEnabled) {
      for (const t of engine.targets) {
        if (t.hit) continue;
        if (t.z > -1.0) {
          const hand = t.hand === 1 ? 1 : 0;
          gfx.xrControllers[hand].position.set(t.x, t.y, t.z + 0.1);
          engine.controllers[hand].vel = [0, 0, -6];
          setTimeout(() => { engine.controllers[hand].vel = [0,0,0]; }, 80);
          break;
        }
      }
    }
    requestAnimationFrame(desktopUpdate);
  }
  desktopUpdate();
}

// ── End screen ──
function showEndScreen() {
  const s = engine.state;
  const totalHits = s.hits.perfect + s.hits.great + s.hits.good + s.hits.weak;
  const acc = Math.round(totalHits / Math.max(1, totalHits + s.hits.miss) * 100);
  overlay.innerHTML = `
    <h1>SESSION COMPLETE</h1>
    <div style="text-align:center;margin:1rem 0;">
      <p style="font-size:2.5rem;color:#ff6b35;font-weight:bold;">${s.score.toLocaleString()}</p>
      <p style="color:#888;">Total Score</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;text-align:center;">
      <div><span style="color:#ffd700;font-size:1.5rem;">${s.maxCombo}x</span><br><span style="color:#888;">Max Combo</span></div>
      <div><span style="color:#00ff88;font-size:1.5rem;">${Math.round(s.calories)}</span><br><span style="color:#888;">Calories</span></div>
      <div><span style="color:#4488ff;font-size:1.5rem;">${s.totalPunches}</span><br><span style="color:#888;">Punches</span></div>
      <div><span style="color:#ff6b35;font-size:1.5rem;">${acc}%</span><br><span style="color:#888;">Accuracy</span></div>
    </div>
    <button id="enter-vr" onclick="location.reload()" style="padding:1rem 2.5rem;font-size:1.2rem;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(135deg,#ff6b35,#e8552a);color:#fff;font-weight:600;margin-top:1rem;">PLAY AGAIN</button>
  `;
}

// ── Resize ──
window.addEventListener('resize', () => {
  gfx.camera.aspect = window.innerWidth / window.innerHeight;
  gfx.camera.updateProjectionMatrix();
  gfx.renderer.setSize(window.innerWidth, window.innerHeight);
});

checkXR();

// ── Debug ──
const debugEl = document.getElementById('debug');
document.addEventListener('keydown', (e) => {
  if (e.key === 'd') debugEl.style.display = debugEl.style.display === 'none' ? 'block' : 'none';
});
setInterval(() => {
  if (debugEl.style.display === 'none') return;
  debugEl.textContent = `FPS: -- | Targets: ${engine.targets.length} | Score: ${engine.state.score} | ${engine.state.metronome ? 'METRO' : 'FREE'}`;
}, 200);

</script>
