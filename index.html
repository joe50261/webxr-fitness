<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Combat Fitness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 70%);
    }
    #overlay h1 {
      font-size: 3rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
    #enter-vr {
      padding: 1rem 2.5rem; font-size: 1.2rem;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, #ff6b35, #e8552a);
      color: #fff; font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #enter-vr:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,107,53,0.4); }
    #enter-vr:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    #status { margin-top: 1rem; color: #666; font-size: 0.9rem; }
    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 20;
      color: #0f0; font-family: monospace; font-size: 12px;
      background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>VR COMBAT FITNESS</h1>
  <p>WebXR 6DoF Rhythm Fighting</p>
  <button id="enter-vr" disabled>Checking WebXR...</button>
  <div id="status"></div>
  <div id="version" style="position:fixed;bottom:10px;right:10px;color:#444;font-size:12px;font-family:monospace;">v0.4.0-perf</div>
</div>

<div id="debug"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const CONFIG = {
  // Target spawning
  SPAWN_DISTANCE: 5,        // meters in front of player
  HIT_DISTANCE: 0.6,        // how close to reach target
  TARGET_SPEED: 3.0,        // m/s travel toward player
  TARGET_RADIUS: 0.15,      // target sphere radius

  // Scoring
  PERFECT_THRESHOLD: 0.1,   // meters — distance for "PERFECT"
  GREAT_THRESHOLD: 0.2,     // "GREAT"
  GOOD_THRESHOLD: 0.4,      // "GOOD"
  MISS_DISTANCE: -0.5,      // passed behind player = miss

  // BPM & rhythm
  BPM: 128,
  BEATS_PER_SPAWN: 2,       // spawn target every N beats

  // Calorie estimation (rough MET-based)
  MET_VALUE: 6.0,           // approx MET for combat fitness
  USER_WEIGHT_KG: 70,       // default, can be changed

  // Velocity thresholds for punch detection
  MIN_PUNCH_VELOCITY: 1.5,  // m/s — minimum speed to count as a punch

  // Colors
  LEFT_COLOR: 0x4488ff,
  RIGHT_COLOR: 0xff4444,
  PERFECT_COLOR: 0xffd700,
  GREAT_COLOR: 0x00ff88,
  GOOD_COLOR: 0x44aaff,
  MISS_COLOR: 0xff2222,

  // Ink impact marks
  INK_SPLAT_BASE_SIZE: 0.2,    // base radius of impact mark
  INK_SPLAT_STRETCH: 2.5,      // max stretch ratio along punch direction
  INK_RESIDUE_LIFETIME: 30,    // seconds before residue fades
  INK_RESIDUE_FADE_TIME: 5,    // seconds to fade out
  MAX_RESIDUE_MARKS: 100,      // cap for performance

  // Anchor point — ideal hit zone (defaults, overwritten by calibration)
  ANCHOR_SIZE: 0.12,           // radius of anchor ring

  // Calibration
  CALIBRATION_HOLD_TIME: 3.0,  // seconds to hold steady
  CALIBRATION_VELOCITY_THRESHOLD: 0.15, // m/s — below this = "steady"
};

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
// Calibrated anchor positions — set during calibration phase
const calibration = {
  done: false,
  left:  new THREE.Vector3(-0.5, 1.3, -0.3),  // defaults
  right: new THREE.Vector3(0.5, 1.3, -0.3),
  steadyStart: [0, 0],  // timestamp when each hand became steady
};

const state = {
  isCalibrating: false,
  score: 0,
  combo: 0,
  maxCombo: 0,
  hits: { perfect: 0, great: 0, good: 0, weak: 0, miss: 0 },
  totalPunches: 0,
  calories: 0,
  sessionStart: 0,
  isPlaying: false,
  beatIndex: 0,
  lastBeatTime: 0,
  targets: [],
  feedbacks: [],          // floating score text
  controllerVelocities: [new THREE.Vector3(), new THREE.Vector3()],
  controllerPrevPos: [new THREE.Vector3(), new THREE.Vector3()],
  controllerPrevPosInit: [false, false],
  trailPoints: [[], []],  // trail effect for controllers
  inkResidues: [],         // impact marks on surfaces
};

// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.cameraAutoUpdate = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.Fog(0x050510, 8, 25);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xff6b35, 2, 20, Math.PI / 4, 0.5);
spotLight.position.set(0, 5, -2);
scene.add(spotLight);

const pointLight1 = new THREE.PointLight(0x4488ff, 1, 15);
pointLight1.position.set(-3, 3, -5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4444, 1, 15);
pointLight2.position.set(3, 3, -5);
scene.add(pointLight2);

// ─────────────────────────────────────────────
// ENVIRONMENT — Arena
// ─────────────────────────────────────────────
function createArena() {
  // Ground — reflective dark floor
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.2,
    metalness: 0.8,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  scene.add(floor);

  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(20, 40, 0x222244, 0x111133);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Side pillars with glow
  for (let side = -1; side <= 1; side += 2) {
    const pillarGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
    const pillarMat = new THREE.MeshStandardMaterial({
      color: side === -1 ? 0x4488ff : 0xff4444,
      emissive: side === -1 ? 0x2244aa : 0xaa2222,
      emissiveIntensity: 0.5,
    });
    for (let z = -8; z <= -2; z += 3) {
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(side * 3, 2, z);
      scene.add(pillar);
    }
  }

  // Spawn lane indicator (two parallel light strips)
  const stripGeo = new THREE.BoxGeometry(0.05, 0.02, 12);
  const stripMat = new THREE.MeshStandardMaterial({
    color: 0xff6b35, emissive: 0xff6b35, emissiveIntensity: 0.3,
  });
  for (let side = -1; side <= 1; side += 2) {
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(side * 1.5, 0.01, -4);
    scene.add(strip);
  }

  // ── Back wall (miss targets splat here) ──
  const wallGeo = new THREE.PlaneGeometry(8, 4);
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a18,
    roughness: 0.6,
    metalness: 0.2,
    transparent: true,
    opacity: 0.85,
  });
  const backWall = new THREE.Mesh(wallGeo, wallMat);
  backWall.position.set(0, 2, CONFIG.MISS_DISTANCE + 0.5);
  backWall.name = 'backWall';
  scene.add(backWall);

  // Subtle border glow on wall edges
  const wallBorderGeo = new THREE.EdgesGeometry(wallGeo);
  const wallBorderMat = new THREE.LineBasicMaterial({
    color: 0x332244, transparent: true, opacity: 0.5,
  });
  const wallBorder = new THREE.LineSegments(wallBorderGeo, wallBorderMat);
  wallBorder.position.copy(backWall.position);
  scene.add(wallBorder);
}
createArena();

// ─────────────────────────────────────────────
// CONTROLLERS
// ─────────────────────────────────────────────
const controllerModelFactory = new XRControllerModelFactory();
const controllers = [];
const controllerGrips = [];
const glovesMeshes = [];

for (let i = 0; i < 2; i++) {
  const controller = renderer.xr.getController(i);
  scene.add(controller);
  controllers.push(controller);

  // Store inputSource when connected — needed for correct haptic mapping
  controller.addEventListener('connected', (event) => {
    controller.userData.inputSource = event.data;
  });
  controller.addEventListener('disconnected', () => {
    controller.userData.inputSource = null;
  });

  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerModelFactory.createControllerModel(grip));
  scene.add(grip);
  controllerGrips.push(grip);

  // Visual "glove" around controller
  const gloveColor = i === 0 ? CONFIG.LEFT_COLOR : CONFIG.RIGHT_COLOR;
  const gloveGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const gloveMat = new THREE.MeshStandardMaterial({
    color: gloveColor,
    emissive: gloveColor,
    emissiveIntensity: 0.4,
    transparent: true,
    opacity: 0.7,
  });
  const glove = new THREE.Mesh(gloveGeo, gloveMat);
  controller.add(glove);
  glovesMeshes.push(glove);

  // Trail line
  const trailGeo = new THREE.BufferGeometry();
  const trailPositions = new Float32Array(30 * 3); // 30 points
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  const trailMat = new THREE.LineBasicMaterial({
    color: gloveColor,
    transparent: true,
    opacity: 0.4,
  });
  const trailLine = new THREE.Line(trailGeo, trailMat);
  trailLine.frustumCulled = false;
  scene.add(trailLine);
  controller.userData.trail = trailLine;
  controller.userData.trailIndex = 0;
}

// ─────────────────────────────────────────────
// PUNCH TYPES — expected velocity direction per type
// ─────────────────────────────────────────────
const PUNCH_TYPES = {
  jab:      { dir: new THREE.Vector3(0, 0, -1), label: 'JAB' },
  cross:    { dir: new THREE.Vector3(0, 0, -1), label: 'CROSS' },
  hook_l:   { dir: new THREE.Vector3(1, 0, 0),  label: 'HOOK' },   // left hand hooks right
  hook_r:   { dir: new THREE.Vector3(-1, 0, 0), label: 'HOOK' },   // right hand hooks left
  uppercut: { dir: new THREE.Vector3(0, 1, 0),  label: 'UPPER' },
};

// ─────────────────────────────────────────────
// TARGET POOL & GENERATION
// ─────────────────────────────────────────────
const targetPool = [];
const TARGET_POOL_SIZE = 20;

// Target geometry — flat disc, orientation IS the instruction
const targetGeo = new THREE.CircleGeometry(CONFIG.TARGET_RADIUS, 24);
const targetRingGeo = new THREE.RingGeometry(
  CONFIG.TARGET_RADIUS * 0.85, CONFIG.TARGET_RADIUS, 24
);

// Shared materials (left=blue, right=red)
function makeTargetMat(color) {
  return new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.5,
    transparent: true, opacity: 0.9, side: THREE.DoubleSide,
  });
}
function makeTargetRingMat(color) {
  return new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.4,
    side: THREE.DoubleSide,
  });
}
const targetMats = {
  left:  { disc: makeTargetMat(CONFIG.LEFT_COLOR),  ring: makeTargetRingMat(CONFIG.LEFT_COLOR) },
  right: { disc: makeTargetMat(CONFIG.RIGHT_COLOR), ring: makeTargetRingMat(CONFIG.RIGHT_COLOR) },
};

function createTarget() {
  const group = new THREE.Group();

  // Solid disc — colored face is the "hit here" surface
  const disc = new THREE.Mesh(targetGeo, targetMats.left.disc);
  group.add(disc);
  group.userData.disc = disc;

  // Thin ring border for visibility
  const ring = new THREE.Mesh(targetRingGeo, targetMats.left.ring);
  group.add(ring);
  group.userData.ring = ring;

  group.visible = false;
  scene.add(group);
  return group;
}

// Pre-populate pool
for (let i = 0; i < TARGET_POOL_SIZE; i++) {
  targetPool.push(createTarget());
}

function getTarget() {
  for (const t of targetPool) {
    if (!t.visible) return t;
  }
  const t = createTarget();
  targetPool.push(t);
  return t;
}

// Spawn patterns — each target has a punch type with expected direction
const SPAWN_PATTERNS = [
  { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'jab' }],      name: 'left_jab' },
  { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'cross' }],     name: 'right_cross' },
  { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'hook_l' }],   name: 'left_hook' },
  { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'hook_r' }],    name: 'right_hook' },
  { positions: [{ x: -0.5, y: 1.3, hand: 0, punch: 'uppercut' }], name: 'left_upper' },
  { positions: [{ x: 0.5, y: 1.3, hand: 1, punch: 'uppercut' }],  name: 'right_upper' },
];

function spawnTarget() {
  const pattern = SPAWN_PATTERNS[Math.floor(Math.random() * SPAWN_PATTERNS.length)];

  for (const pos of pattern.positions) {
    const target = getTarget();
    const variant = pos.hand === 0 ? 'left' : 'right';
    target.userData.disc.material = targetMats[variant].disc;
    target.userData.ring.material = targetMats[variant].ring;
    target.userData.hand = pos.hand;
    target.userData.hit = false;
    target.userData.spawnTime = performance.now();

    // Punch type and expected direction
    const punchType = PUNCH_TYPES[pos.punch || 'jab'];
    target.userData.punchType = pos.punch || 'jab';
    target.userData.expectedDir = punchType.dir.clone();

    // Orient disc so its face normal = expected punch direction
    // Player sees the face → "punch INTO this surface"
    const dir = punchType.dir;
    target.quaternion.setFromUnitVectors(
      new THREE.Vector3(0, 0, 1),  // CircleGeometry default normal
      dir.clone().negate()          // face toward incoming punch
    );

    // Position: fixed from pattern
    target.position.set(pos.x, pos.y, -CONFIG.SPAWN_DISTANCE);

    target.visible = true;
    target.scale.setScalar(0.01);
    state.targets.push(target);
  }
}

// ─────────────────────────────────────────────
// SCORING & FEEDBACK
// ─────────────────────────────────────────────
// Evaluate hit — combines distance accuracy + angle accuracy
function evaluateHit(distance, punchVelocity, expectedDir) {
  // Distance grade
  let distLabel, distScore;
  if (distance < CONFIG.PERFECT_THRESHOLD) {
    distLabel = 'PERFECT'; distScore = 100;
  } else if (distance < CONFIG.GREAT_THRESHOLD) {
    distLabel = 'GREAT'; distScore = 75;
  } else if (distance < CONFIG.GOOD_THRESHOLD) {
    distLabel = 'GOOD'; distScore = 50;
  } else if (distance < CONFIG.HIT_DISTANCE) {
    distLabel = 'WEAK'; distScore = 20;
  } else {
    return null;
  }

  // Angle accuracy: dot product of punch direction vs expected
  let angleAccuracy = 1.0;
  if (expectedDir && punchVelocity.lengthSq() > 0.01) {
    tmpVec.copy(punchVelocity).normalize();
    angleAccuracy = Math.max(0, tmpVec.dot(expectedDir));
  }

  // Combined score — angle scales the distance score
  const score = Math.round(distScore * (0.5 + 0.5 * angleAccuracy));
  const breaksCombo = distLabel === 'WEAK' || angleAccuracy < 0.3;

  // Label reflects worst dimension
  const label = angleAccuracy < 0.3 ? 'WEAK' :
                angleAccuracy < 0.6 ? (distLabel === 'PERFECT' ? 'GREAT' : distLabel) :
                distLabel;
  const color = label === 'PERFECT' ? CONFIG.PERFECT_COLOR :
                label === 'GREAT'   ? CONFIG.GREAT_COLOR :
                label === 'GOOD'    ? CONFIG.GOOD_COLOR : 0x886644;

  return { label, score, color, angleAccuracy, breaksCombo };
}

function showFeedback(position, label, color) {
  // Create floating text sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 128);
  ctx.font = 'bold 48px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  ctx.fillText(label, 128, 72);

  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(0.8, 0.4, 1);
  sprite.userData.life = 1.0;
  scene.add(sprite);
  state.feedbacks.push(sprite);
}

function onHit(target, controllerIndex, distance) {
  const punchVel = state.controllerVelocities[controllerIndex];
  const expectedDir = target.userData.expectedDir || null;
  const result = evaluateHit(distance, punchVel, expectedDir);
  if (!result) return;

  // target.visible and .hit already set by collision code
  // WEAK hits break combo, other hits build it
  if (result.breaksCombo) {
    state.combo = 0;
  } else {
    state.combo++;
  }
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const comboMultiplier = 1 + Math.floor(state.combo / 10) * 0.5;
  const points = Math.round(result.score * comboMultiplier);
  state.score += points;
  state.totalPunches++;
  state.hits[result.label.toLowerCase()]++;

  // Haptic feedback — use the stored inputSource for correct hand mapping
  const inputSource = controllers[controllerIndex]?.userData?.inputSource;
  if (inputSource && inputSource.gamepad) {
    const gp = inputSource.gamepad;
    if (gp.hapticActuators && gp.hapticActuators.length > 0) {
      gp.hapticActuators[0].pulse(0.8, 100);
    }
  }

  // Impact mark — hand color (blue/red), opacity encodes precision
  const handColor = controllerIndex === 0 ? CONFIG.LEFT_COLOR : CONFIG.RIGHT_COLOR;
  createImpactMark(target.position.clone(), punchVel, handColor, result.label);

  // Show feedback text
  const feedbackPos = target.position.clone();
  feedbackPos.y += 0.3;
  const angleTag = result.angleAccuracy < 0.6 ? ' ✕' : '';
  showFeedback(feedbackPos, `${result.label} +${points}${angleTag}`, result.color);

  // Glove pulse
  const glove = glovesMeshes[controllerIndex];
  if (glove) {
    glove.scale.setScalar(1.5);
  }
}

function onMiss(target) {
  state.combo = 0;
  state.hits.miss++;

  const missHandColor = target.userData.hand === 0 ? CONFIG.LEFT_COLOR :
                        target.userData.hand === 1 ? CONFIG.RIGHT_COLOR : 0x666666;
  createMissMark(target.position, missHandColor);

  const feedbackPos = target.position.clone();
  feedbackPos.y += 0.2;
  showFeedback(feedbackPos, 'MISS', CONFIG.MISS_COLOR);
  target.visible = false;
}

// ─────────────────────────────────────────────
// INK IMPACT MARK SYSTEM
// Single directional splat per hit — deformed along punch direction
// ─────────────────────────────────────────────

const inkSplatGeo = new THREE.CircleGeometry(1, 16);

// Pre-generate splat texture variants per color
const splatTextureCache = {};
const SPLAT_VARIANTS = 8;

function getSplatTexture(color) {
  if (!splatTextureCache[color]) {
    splatTextureCache[color] = [];
    for (let v = 0; v < SPLAT_VARIANTS; v++) {
      splatTextureCache[color].push(generateSplatTexture(color));
    }
  }
  const variants = splatTextureCache[color];
  return variants[Math.floor(Math.random() * variants.length)];
}

function generateSplatTexture(color) {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const cx = size / 2, cy = size / 2;
  const hex = '#' + color.toString(16).padStart(6, '0');

  // Main blob — irregular radial shape
  ctx.beginPath();
  const points = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const radius = (size * 0.3) + Math.random() * (size * 0.15);
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.45);
  grad.addColorStop(0, hex);
  grad.addColorStop(0.6, hex);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

// ── Anchor rings — two persistent meshes, positioned by calibration ──
const anchorRingGeo = new THREE.RingGeometry(0.9, 1.0, 24);
const anchorMatLeft = new THREE.MeshBasicMaterial({
  color: CONFIG.LEFT_COLOR, transparent: true, opacity: 0.4,
  depthWrite: false, side: THREE.DoubleSide,
});
const anchorMatRight = new THREE.MeshBasicMaterial({
  color: CONFIG.RIGHT_COLOR, transparent: true, opacity: 0.4,
  depthWrite: false, side: THREE.DoubleSide,
});

const anchors = [null, null]; // [left, right]
function createAnchors() {
  for (let i = 0; i < 2; i++) {
    const mat = i === 0 ? anchorMatLeft : anchorMatRight;
    const anchor = new THREE.Mesh(anchorRingGeo, mat);
    const pos = i === 0 ? calibration.left : calibration.right;
    anchor.position.copy(pos);
    anchor.lookAt(pos.x, pos.y, pos.z + 1);
    anchor.scale.setScalar(CONFIG.ANCHOR_SIZE);
    scene.add(anchor);
    anchors[i] = anchor;
  }
}
createAnchors();

function updateAnchorPositions() {
  for (let i = 0; i < 2; i++) {
    const pos = i === 0 ? calibration.left : calibration.right;
    anchors[i].position.copy(pos);
    anchors[i].lookAt(pos.x, pos.y, pos.z + 1);
  }
}

// Create a single impact mark — faces player, opacity = precision
function createImpactMark(position, punchVelocity, color, hitQuality) {
  // Remove oldest if over cap
  while (state.inkResidues.length >= CONFIG.MAX_RESIDUE_MARKS) {
    const oldest = state.inkResidues.shift();
    scene.remove(oldest);
    oldest.material.map?.dispose();
    oldest.material.dispose();
  }

  // Opacity encodes quality: PERFECT = deep, WEAK = faint
  const qualityOpacity = hitQuality === 'PERFECT' ? 0.95 :
                         hitQuality === 'GREAT'   ? 0.75 :
                         hitQuality === 'GOOD'    ? 0.5  : 0.25;

  const texture = getSplatTexture(color);
  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    opacity: qualityOpacity,
    depthWrite: false,
    side: THREE.DoubleSide,
  });

  const splat = new THREE.Mesh(inkSplatGeo, mat);
  splat.position.copy(position);

  // Normal = cross(punchDir, up)
  // Jab (-Z) → normal along X (sagittal)
  // Hook (±X) → normal along Z (frontal)
  // Mixed punch → mixed angle
  const punchSpeed = punchVelocity.length();
  const up = tmpVec.set(0, 1, 0);
  const normal = tmpVec2.crossVectors(punchVelocity, up);
  if (normal.lengthSq() < 0.01) {
    // Near-vertical punch (uppercut) — fallback to sagittal
    normal.set(1, 0, 0);
  }
  normal.normalize();
  splat.lookAt(position.x + normal.x, position.y + normal.y, position.z + normal.z);

  // Size based on hit quality + stretch along punch direction
  const baseSize = CONFIG.INK_SPLAT_BASE_SIZE;
  const qualityMult = hitQuality === 'PERFECT' ? 1.5 :
                      hitQuality === 'GREAT' ? 1.2 :
                      hitQuality === 'GOOD' ? 0.9 : 0.6;

  const stretchAmount = Math.min(1 + (punchSpeed / 3) * CONFIG.INK_SPLAT_STRETCH, 4.0);

  const sizeBase = baseSize * qualityMult;
  splat.scale.set(
    sizeBase,                  // width (horizontal on the mark's plane)
    sizeBase * stretchAmount,  // height (stretch encodes punch force)

    1
  );

  splat.userData = {
    spawnTime: performance.now(),
    lifetime: CONFIG.INK_RESIDUE_LIFETIME * 1000,
    fadeTime: CONFIG.INK_RESIDUE_FADE_TIME * 1000,
    hitQuality: hitQuality,
    baseOpacity: qualityOpacity,
  };

  scene.add(splat);
  state.inkResidues.push(splat);
}

// Miss mark — very faint hand color, facing player
function createMissMark(position, handColor) {
  while (state.inkResidues.length >= CONFIG.MAX_RESIDUE_MARKS) {
    const oldest = state.inkResidues.shift();
    scene.remove(oldest);
    oldest.material.map?.dispose();
    oldest.material.dispose();
  }

  const texture = getSplatTexture(handColor);
  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    opacity: 0.15,
    depthWrite: false,
    side: THREE.DoubleSide,
  });

  const splat = new THREE.Mesh(inkSplatGeo, mat);
  splat.position.copy(position);
  splat.lookAt(position.x, position.y, position.z + 1);
  splat.rotation.z = Math.random() * Math.PI * 2;
  const size = CONFIG.INK_SPLAT_BASE_SIZE * (1.5 + Math.random() * 0.5);
  splat.scale.set(size, size, 1);

  splat.userData = {
    spawnTime: performance.now(),
    lifetime: CONFIG.INK_RESIDUE_LIFETIME * 1000,
    fadeTime: CONFIG.INK_RESIDUE_FADE_TIME * 1000,
    hitQuality: 'MISS',
    baseOpacity: 0.15,
  };

  scene.add(splat);
  state.inkResidues.push(splat);
}

// Update residue marks — fade over time (no droplet physics needed)
function updateInkSystem(delta) {
  const now = performance.now();

  for (let i = state.inkResidues.length - 1; i >= 0; i--) {
    const r = state.inkResidues[i];
    const age = now - r.userData.spawnTime;
    const remaining = r.userData.lifetime - age;

    if (remaining <= 0) {
      scene.remove(r);
      r.material.map?.dispose();
      r.material.dispose();
      state.inkResidues.splice(i, 1);
    } else if (remaining < r.userData.fadeTime) {
      r.material.opacity = r.userData.baseOpacity * (remaining / r.userData.fadeTime);
    }
  }
}

// HUD (in-VR using sprites)

let hudSprite;
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512;
hudCanvas.height = 256;
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);

function createHUD() {
  const mat = new THREE.SpriteMaterial({ map: hudTexture, transparent: true, depthTest: false });
  hudSprite = new THREE.Sprite(mat);
  hudSprite.scale.set(1.5, 0.75, 1);
  // Will be positioned relative to camera each frame
  scene.add(hudSprite);
}
createHUD();

// HUD dirty-flag state — avoid redrawing every frame
const hudPrev = { score: -1, combo: -1, seconds: -1, perfect: -1, great: -1, good: -1, weak: -1, miss: -1 };

function updateHUD() {
  const elapsed = state.sessionStart > 0 ? (performance.now() - state.sessionStart) / 1000 : 0;
  const curSeconds = Math.floor(elapsed);

  // Only redraw when values actually change
  if (hudPrev.score === state.score && hudPrev.combo === state.combo &&
      hudPrev.seconds === curSeconds && hudPrev.miss === state.hits.miss) return;

  hudPrev.score = state.score;
  hudPrev.combo = state.combo;
  hudPrev.seconds = curSeconds;
  hudPrev.perfect = state.hits.perfect;
  hudPrev.great = state.hits.great;
  hudPrev.good = state.hits.good;
  hudPrev.weak = state.hits.weak;
  hudPrev.miss = state.hits.miss;

  const ctx = hudCtx;
  ctx.clearRect(0, 0, 512, 256);

  // Background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.roundRect(10, 10, 492, 236, 15);
  ctx.fill();

  // Score
  ctx.font = 'bold 42px Segoe UI, sans-serif';
  ctx.fillStyle = '#ff6b35';
  ctx.textAlign = 'left';
  ctx.fillText(state.score.toLocaleString(), 30, 65);

  // Combo
  if (state.combo > 1) {
    ctx.font = 'bold 28px Segoe UI, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`${state.combo}x COMBO`, 30, 105);
  }

  // Stats
  ctx.font = '18px Segoe UI, sans-serif';
  ctx.fillStyle = '#aaa';
  const minutes = Math.floor(curSeconds / 60);
  const secs = curSeconds % 60;
  ctx.fillText(`Time: ${minutes}:${secs.toString().padStart(2, '0')}`, 30, 145);

  // Calories (MET formula: kcal/min = MET * weight * 3.5 / 200)
  state.calories = (CONFIG.MET_VALUE * CONFIG.USER_WEIGHT_KG * 3.5 / 200) * (curSeconds / 60);
  ctx.fillText(`Cal: ${Math.round(state.calories)} kcal`, 30, 175);

  // Accuracy
  const totalHits = state.hits.perfect + state.hits.great + state.hits.good + state.hits.weak;
  const totalAttempts = totalHits + state.hits.miss;
  const accuracy = totalAttempts > 0 ? Math.round((totalHits / totalAttempts) * 100) : 100;
  ctx.fillText(`Accuracy: ${accuracy}%`, 30, 205);

  // Right side — hit breakdown
  ctx.textAlign = 'right';
  ctx.font = '16px Segoe UI, sans-serif';
  ctx.fillStyle = '#ffd700'; ctx.fillText(`Perfect: ${state.hits.perfect}`, 480, 145);
  ctx.fillStyle = '#00ff88'; ctx.fillText(`Great: ${state.hits.great}`, 480, 170);
  ctx.fillStyle = '#44aaff'; ctx.fillText(`Good: ${state.hits.good}`, 480, 195);
  ctx.fillStyle = '#886644'; ctx.fillText(`Weak: ${state.hits.weak}`, 480, 220);
  ctx.fillStyle = '#ff2222'; ctx.fillText(`Miss: ${state.hits.miss}`, 480, 245);

  hudTexture.needsUpdate = true;
}

// ─────────────────────────────────────────────
// BEAT / RHYTHM ENGINE
// ─────────────────────────────────────────────
const beatInterval = () => (60 / CONFIG.BPM) * CONFIG.BEATS_PER_SPAWN * 1000; // ms

// AudioContext for beat sync (created on user gesture)
let audioCtx = null;
let beatOsc = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeatTick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function playHitSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 220;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();
const tmpVec = new THREE.Vector3();
const tmpVec2 = new THREE.Vector3();
const cameraWorldPos = new THREE.Vector3();
const ctrlWorldPos = [new THREE.Vector3(), new THREE.Vector3()];
const hudOffset = new THREE.Vector3(0, 1.2, 0);

// ─────────────────────────────────────────────
// CALIBRATION — extend arms forward, hold steady to set anchor positions
// ─────────────────────────────────────────────
let calibHUD = null;
const calibCanvas = document.createElement('canvas');
calibCanvas.width = 512; calibCanvas.height = 128;
const calibCtx = calibCanvas.getContext('2d');
const calibTexture = new THREE.CanvasTexture(calibCanvas);

function createCalibHUD() {
  const mat = new THREE.SpriteMaterial({ map: calibTexture, transparent: true, depthTest: false });
  calibHUD = new THREE.Sprite(mat);
  calibHUD.scale.set(1.5, 0.4, 1);
  calibHUD.visible = false;
  scene.add(calibHUD);
}
createCalibHUD();

function updateCalibHUD(progress, text) {
  const ctx = calibCtx;
  ctx.clearRect(0, 0, 512, 128);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.roundRect(10, 10, 492, 108, 12);
  ctx.fill();

  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(30, 85, 452, 16);
  ctx.fillStyle = progress >= 1 ? '#00ff88' : '#ff6b35';
  ctx.fillRect(30, 85, 452 * Math.min(progress, 1), 16);

  // Text
  ctx.font = 'bold 28px Segoe UI, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 60);
  calibTexture.needsUpdate = true;
}

function calibrationLoop(delta) {
  const now = performance.now();

  // Get controller world positions
  for (let i = 0; i < 2; i++) {
    controllers[i].getWorldPosition(ctrlWorldPos[i]);
  }

  // Anchors follow controllers in real-time during calibration
  calibration.left.copy(ctrlWorldPos[0]);
  calibration.right.copy(ctrlWorldPos[1]);
  updateAnchorPositions();

  // Check velocity — are both hands steady?
  let bothSteady = true;
  for (let i = 0; i < 2; i++) {
    const speed = state.controllerVelocities[i].length();
    if (speed > CONFIG.CALIBRATION_VELOCITY_THRESHOLD) {
      calibration.steadyStart[i] = now;
      bothSteady = false;
    }
  }

  // Calculate hold progress
  const minSteady = Math.min(
    now - calibration.steadyStart[0],
    now - calibration.steadyStart[1]
  );
  const holdProgress = minSteady / (CONFIG.CALIBRATION_HOLD_TIME * 1000);

  // Position calibration HUD in front of camera
  camera.getWorldPosition(cameraWorldPos);
  tmpVec.set(0, 0, -1).applyQuaternion(camera.quaternion);
  calibHUD.position.copy(cameraWorldPos).add(tmpVec.multiplyScalar(2.0)).add(hudOffset);
  calibHUD.quaternion.copy(camera.quaternion);
  calibHUD.visible = true;

  if (holdProgress >= 1 && bothSteady) {
    // Calibration complete — lock positions
    calibration.done = true;
    state.isCalibrating = false;
    calibHUD.visible = false;

    // Start game
    state.isPlaying = true;
    state.sessionStart = performance.now();
    state.lastBeatTime = performance.now();

    // Update all spawn patterns with calibrated positions
    for (const pat of SPAWN_PATTERNS) {
      for (const pos of pat.positions) {
        const cal = pos.hand === 0 ? calibration.left : calibration.right;
        pos.x = cal.x;
        pos.y = cal.y;
      }
    }

    updateAnchorPositions();
    return;
  }

  updateCalibHUD(holdProgress, bothSteady ? 'Hold steady...' : 'Extend arms forward');

  // Update controller velocities during calibration (reuse gameLoop logic)
  for (let i = 0; i < 2; i++) {
    if (state.controllerPrevPosInit[i]) {
      state.controllerVelocities[i].subVectors(ctrlWorldPos[i], state.controllerPrevPos[i]).divideScalar(delta);
    }
    state.controllerPrevPos[i].copy(ctrlWorldPos[i]);
    state.controllerPrevPosInit[i] = true;
  }
}

function gameLoop(timestamp, frame) {
  const delta = clock.getDelta();

  // Calibration phase runs before gameplay
  if (state.isCalibrating) {
    calibrationLoop(delta);
    return;
  }

  if (!state.isPlaying) return;

  const now = performance.now();

  // ── Beat-based spawning ──
  if (now - state.lastBeatTime > beatInterval()) {
    state.lastBeatTime = now;
    state.beatIndex++;
    spawnTarget();
    playBeatTick();
  }

  // ── Update controller velocities ──
  for (let i = 0; i < controllers.length; i++) {
    const ctrl = controllers[i];
    const worldPos = ctrlWorldPos[i];
    ctrl.getWorldPosition(worldPos);

    if (state.controllerPrevPosInit[i]) {
      state.controllerVelocities[i].subVectors(worldPos, state.controllerPrevPos[i]).divideScalar(delta);
    }
    state.controllerPrevPos[i].copy(worldPos);
    state.controllerPrevPosInit[i] = true;

    // Update trail
    const trail = ctrl.userData.trail;
    if (trail) {
      const posAttr = trail.geometry.getAttribute('position');
      const idx = (ctrl.userData.trailIndex % 30) * 3;
      posAttr.array[idx] = worldPos.x;
      posAttr.array[idx + 1] = worldPos.y;
      posAttr.array[idx + 2] = worldPos.z;
      posAttr.needsUpdate = true;
      ctrl.userData.trailIndex++;
    }

    // Glove pulse decay
    const glove = glovesMeshes[i];
    if (glove && glove.scale.x > 1.0) {
      glove.scale.multiplyScalar(0.9);
      if (glove.scale.x < 1.01) glove.scale.setScalar(1.0);
    }

  }

  // ── Update targets ──
  for (let i = state.targets.length - 1; i >= 0; i--) {
    const target = state.targets[i];
    if (target.userData.hit) {
      state.targets.splice(i, 1);
      continue;
    }

    // Move toward player
    target.position.z += CONFIG.TARGET_SPEED * delta;

    // Scale-in animation
    if (target.scale.x < 1) {
      target.scale.addScalar(delta * 5);
      if (target.scale.x > 1) target.scale.setScalar(1);
    }

    // Collision detection with controllers (check BEFORE miss)
    // Early exit: skip expensive distance calcs if target is still far away
    if (target.position.z < -CONFIG.HIT_DISTANCE * 2) continue;
    let wasHit = false;
    for (let c = 0; c < controllers.length; c++) {
      // Check hand preference
      if (target.userData.hand !== -1 && target.userData.hand !== c) continue;

      const dist = ctrlWorldPos[c].distanceTo(target.position);

      // Check if close enough AND moving fast enough (actual punch)
      const speed = state.controllerVelocities[c].length();
      if (dist < CONFIG.HIT_DISTANCE && speed > CONFIG.MIN_PUNCH_VELOCITY) {
        // Always hide target on collision — even if scoring says it's too far for points
        target.userData.hit = true;
        target.visible = false;
        onHit(target, c, dist);
        playHitSound();
        state.targets.splice(i, 1);
        wasHit = true;
        break;
      }
    }
    if (wasHit) continue;

    // Check if passed player (miss)
    if (target.position.z > CONFIG.MISS_DISTANCE) {
      onMiss(target);
      state.targets.splice(i, 1);
      continue;
    }
  }

  // ── Update ink residue marks (fade over time) ──
  updateInkSystem(delta);

  // ── Update feedback sprites ──
  for (let i = state.feedbacks.length - 1; i >= 0; i--) {
    const fb = state.feedbacks[i];
    fb.userData.life -= delta * 1.5;
    if (fb.userData.life <= 0) {
      scene.remove(fb);
      fb.material.dispose();
      fb.material.map.dispose();
      state.feedbacks.splice(i, 1);
      continue;
    }
    fb.position.y += delta * 0.5;
    fb.material.opacity = fb.userData.life;
  }

  // ── Position HUD relative to camera ──
  camera.getWorldPosition(cameraWorldPos);
  tmpVec.set(0, 0, -1).applyQuaternion(camera.quaternion);
  hudSprite.position.copy(cameraWorldPos)
    .add(tmpVec.multiplyScalar(2.5))
    .add(hudOffset);
  hudSprite.quaternion.copy(camera.quaternion);

  // ── Update HUD ──
  updateHUD();

  // ── Animate arena lighting ──
  const beatPhase = ((now % (60000 / CONFIG.BPM)) / (60000 / CONFIG.BPM));
  const pulse = 0.5 + 0.5 * Math.pow(1 - beatPhase, 3);
  spotLight.intensity = 1.5 + pulse;
}

// ─────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────
renderer.setAnimationLoop(function (timestamp, frame) {
  gameLoop(timestamp, frame);
  renderer.render(scene, camera);
});

// ─────────────────────────────────────────────
// WEBXR SESSION MANAGEMENT
// ─────────────────────────────────────────────
const enterBtn = document.getElementById('enter-vr');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');

async function checkXR() {
  if (!navigator.xr) {
    statusEl.textContent = 'WebXR not supported in this browser.';
    enterBtn.textContent = 'WebXR Not Available';
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-vr');
  if (supported) {
    enterBtn.disabled = false;
    enterBtn.textContent = 'ENTER VR';
    statusEl.textContent = 'Put on your headset and press the button';
  } else {
    // Try inline mode for desktop testing
    enterBtn.disabled = false;
    enterBtn.textContent = 'START (Desktop Mode)';
    statusEl.textContent = 'No VR headset detected — desktop preview mode';
    enterBtn.dataset.mode = 'inline';
  }
}

enterBtn.addEventListener('click', async () => {
  initAudio();

  if (enterBtn.dataset.mode === 'inline') {
    // Desktop mode — just start the game without VR
    overlay.style.display = 'none';
    state.isPlaying = true;
    state.sessionStart = performance.now();
    state.lastBeatTime = performance.now();

    // Add mouse-based controller simulation for desktop
    initDesktopControls();
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking'],
    });

    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(session);

    overlay.style.display = 'none';

    // Enter calibration phase — game starts after calibration completes
    state.isCalibrating = true;
    calibration.steadyStart[0] = performance.now();
    calibration.steadyStart[1] = performance.now();

    session.addEventListener('end', () => {
      state.isPlaying = false;
      overlay.style.display = 'flex';
      showEndScreen();
    });

  } catch (err) {
    statusEl.textContent = `Failed to start VR: ${err.message}`;
  }
});

// ─────────────────────────────────────────────
// DESKTOP PREVIEW (for testing without headset)
// ─────────────────────────────────────────────
function initDesktopControls() {
  // Desktop overrides — relax thresholds for easy testing
  CONFIG.HIT_DISTANCE = 1.2;        // much larger hit zone
  CONFIG.MIN_PUNCH_VELOCITY = 0.0;  // no speed requirement
  CONFIG.TARGET_SPEED = 2.0;        // slower targets

  const mouse = new THREE.Vector2();
  let autoHitEnabled = true;
  const desktopClock = new THREE.Clock();

  // On-screen instructions
  const hint = document.createElement('div');
  hint.style.cssText = 'position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;' +
    'color:#888;font-size:13px;font-family:monospace;background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:8px;';
  hint.innerHTML = 'Desktop Test Mode — <b>Mouse</b>: aim | <b>Click</b>: punch | <b>Space</b>: toggle auto-hit | <b>WASD</b>: move';
  document.body.appendChild(hint);

  // Auto-hit indicator
  const autoLabel = document.createElement('div');
  autoLabel.style.cssText = 'position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:20;' +
    'color:#0f0;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;';
  autoLabel.textContent = 'AUTO-HIT: ON';
  document.body.appendChild(autoLabel);

  // Crosshair cursor
  const crosshair = document.createElement('div');
  crosshair.style.cssText = 'position:fixed;width:20px;height:20px;pointer-events:none;z-index:25;' +
    'border:2px solid rgba(255,107,53,0.8);border-radius:50%;transform:translate(-50%,-50%);' +
    'box-shadow:0 0 10px rgba(255,107,53,0.3);';
  document.body.appendChild(crosshair);

  document.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    // Position crosshair
    crosshair.style.left = e.clientX + 'px';
    crosshair.style.top = e.clientY + 'px';

    // Move virtual controllers to match mouse in 3D space
    const x = mouse.x * 2;
    const y = 1.3 + mouse.y * 0.8;
    controllers[0].position.set(x - 0.15, y, -0.3);
    controllers[1].position.set(x + 0.15, y, -0.3);
  });

  // Click = manual punch (always set high velocity)
  document.addEventListener('click', () => {
    state.controllerVelocities[0].set(0, 0, -8);
    state.controllerVelocities[1].set(0, 0, -8);
    setTimeout(() => {
      state.controllerVelocities[0].set(0, 0, 0);
      state.controllerVelocities[1].set(0, 0, 0);
    }, 150);
  });

  // Space = toggle auto-hit
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      autoHitEnabled = !autoHitEnabled;
      autoLabel.textContent = 'AUTO-HIT: ' + (autoHitEnabled ? 'ON' : 'OFF');
      autoLabel.style.color = autoHitEnabled ? '#0f0' : '#f44';
    }
  });

  // WASD camera
  const keys = {};
  document.addEventListener('keydown', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', (e) => { if (e.key.length === 1) keys[e.key.toLowerCase()] = false; });

  // Desktop game loop — auto-hit nearby targets
  function desktopUpdate() {
    const dt = desktopClock.getDelta();

    // Camera movement
    const speed = 3 * dt;
    if (keys['w']) camera.position.z -= speed;
    if (keys['s']) camera.position.z += speed;
    if (keys['a']) camera.position.x -= speed;
    if (keys['d']) camera.position.x += speed;

    // Auto-hit: when targets get close, automatically punch them
    if (autoHitEnabled) {
      for (const target of state.targets) {
        if (target.userData.hit || !target.visible) continue;
        // Auto-hit when target is within reach (z > -1.0)
        if (target.position.z > -1.0) {
          // Teleport controller to target and set velocity
          const hand = target.userData.hand === 1 ? 1 : 0;
          controllers[hand].position.copy(target.position);
          controllers[hand].position.z += 0.1;
          state.controllerVelocities[hand].set(0, 0, -6);
          setTimeout(() => {
            state.controllerVelocities[hand].set(0, 0, 0);
          }, 80);
          break; // one per frame
        }
      }
    }

    requestAnimationFrame(desktopUpdate);
  }
  desktopUpdate();
}

// ─────────────────────────────────────────────
// END SCREEN
// ─────────────────────────────────────────────
function showEndScreen() {
  overlay.innerHTML = `
    <h1>SESSION COMPLETE</h1>
    <div style="text-align:center; margin: 1rem 0;">
      <p style="font-size:2.5rem; color:#ff6b35; font-weight:bold;">${state.score.toLocaleString()}</p>
      <p style="color:#888;">Total Score</p>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:1rem 0; text-align:center;">
      <div><span style="color:#ffd700; font-size:1.5rem;">${state.maxCombo}x</span><br><span style="color:#888;">Max Combo</span></div>
      <div><span style="color:#00ff88; font-size:1.5rem;">${Math.round(state.calories)}</span><br><span style="color:#888;">Calories</span></div>
      <div><span style="color:#4488ff; font-size:1.5rem;">${state.totalPunches}</span><br><span style="color:#888;">Punches</span></div>
      <div><span style="color:#ff6b35; font-size:1.5rem;">${
        Math.round((state.hits.perfect + state.hits.great + state.hits.good + state.hits.weak) /
        Math.max(1, state.hits.perfect + state.hits.great + state.hits.good + state.hits.weak + state.hits.miss) * 100)
      }%</span><br><span style="color:#888;">Accuracy</span></div>
      <div><span style="color:#886644; font-size:1.5rem;">${state.hits.weak}</span><br><span style="color:#888;">Weak</span></div>
    </div>
    <button id="enter-vr" onclick="location.reload()" style="
      padding:1rem 2.5rem; font-size:1.2rem; border:none; border-radius:50px;
      cursor:pointer; background:linear-gradient(135deg,#ff6b35,#e8552a);
      color:#fff; font-weight:600; margin-top:1rem;
    ">PLAY AGAIN</button>
  `;
}

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

checkXR();

// ── Debug info (press D to toggle) ──
const debugEl = document.getElementById('debug');
document.addEventListener('keydown', (e) => {
  if (e.key === 'd') {
    debugEl.style.display = debugEl.style.display === 'none' ? 'block' : 'none';
  }
});
setInterval(() => {
  if (debugEl.style.display === 'none') return;
  debugEl.textContent = `FPS: -- | Targets: ${state.targets.length} | Score: ${state.score}`;
}, 200);

</script>
</body>
</html>
